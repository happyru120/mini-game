<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🔥 미니게임 컬렉션 — 부수고, 깨고, 즐겨라!</title>
  <meta name="description" content="열받을 때, 심심할 때, 설치 없이 바로 플레이하는 고퀄리티 미니게임 모음">
  <link rel="stylesheet" href="shared/styles/common.css">
  <style>
    .hub-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }

    /* Header */
    .hub-header {
      text-align: center;
      padding: 40px 0 20px;
    }

    .hub-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .hub-title .fire {
      display: inline-block;
      animation: pulseGlow 2s ease-in-out infinite;
    }

    .hub-subtitle {
      color: var(--apple-label-secondary);
      font-size: 16px;
    }

    /* Mood Selector */
    .mood-section {
      text-align: center;
      margin: 30px 0;
    }

    .mood-question {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .mood-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .mood-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 16px 24px;
      background: var(--apple-bg-secondary);
      border: 2px solid var(--apple-separator);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all 0.2s;
      color: var(--apple-label);
      font-family: -apple-system, 'Apple SD Gothic Neo', BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      font-weight: 600;
      min-width: 100px;
      box-shadow: var(--shadow-sm);
    }

    .mood-btn:hover, .mood-btn.active {
      border-color: var(--apple-blue);
      background: rgba(0, 122, 255, 0.08);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .mood-emoji {
      font-size: 36px;
    }

    /* Rage Level */
    .rage-level {
      display: none;
      text-align: center;
      margin: 20px 0;
      animation: slideUp 0.3s ease-out;
    }

    .rage-level.visible {
      display: block;
    }

    .rage-level-title {
      font-size: 15px;
      margin-bottom: 12px;
      color: var(--apple-label-secondary);
    }

    .rage-level-btns {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .rage-lvl-btn {
      padding: 10px 20px;
      border-radius: 20px;
      border: 2px solid var(--apple-separator);
      background: var(--apple-bg-secondary);
      color: var(--apple-label);
      font-family: -apple-system, 'Apple SD Gothic Neo', BlinkMacSystemFont, sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .rage-lvl-btn:hover {
      background: var(--apple-red);
      border-color: var(--apple-red);
      color: #FFFFFF;
    }

    /* Category Tabs */
    .category-tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 24px 0 16px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 10px 20px;
      background: var(--apple-bg-secondary);
      border: 2px solid transparent;
      border-radius: 24px;
      color: var(--apple-label-secondary);
      font-family: -apple-system, 'Apple SD Gothic Neo', BlinkMacSystemFont, sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .tab-btn:hover { color: var(--apple-label); }
    .tab-btn.active {
      background: var(--apple-blue);
      color: #FFFFFF;
      border-color: transparent;
    }

    /* Game Grid */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .game-card {
      background: var(--apple-bg-secondary);
      border: 1px solid var(--apple-separator);
      border-radius: var(--radius-lg);
      padding: 24px;
      cursor: pointer;
      transition: all 0.25s;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .game-card:hover {
      border-color: var(--apple-blue);
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .game-card-emoji {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .game-card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .game-card-desc {
      font-size: 13px;
      color: var(--apple-label-secondary);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .game-card-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--apple-label-secondary);
    }

    .game-card-tag {
      padding: 4px 10px;
      background: rgba(0, 122, 255, 0.12);
      color: var(--apple-blue);
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 11px;
    }

    .game-card.locked {
      opacity: 0.5;
      pointer-events: none;
    }

    .game-card.locked::after {
      content: '🔒 Coming Soon';
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 12px;
      background: var(--apple-bg-tertiary);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 30px 0 10px;
      padding: 16px;
      background: var(--apple-bg-secondary);
      border-radius: var(--radius-lg);
      flex-wrap: wrap;
      box-shadow: var(--shadow-sm);
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--apple-blue);
    }

    .stat-label {
      font-size: 11px;
      color: var(--apple-label-secondary);
      margin-top: 2px;
    }

    /* Footer */
    .hub-footer {
      text-align: center;
      padding: 40px 0 20px;
      font-size: 13px;
      color: var(--apple-label-secondary);
    }

    @media (max-width: 480px) {
      .hub-title { font-size: 24px; }
      .mood-btn { min-width: 80px; padding: 12px 16px; }
      .mood-emoji { font-size: 28px; }
      .games-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="hub-container">
    <!-- Header -->
    <header class="hub-header">
      <h1 class="hub-title"><span class="fire">🔥</span> 미니게임 컬렉션</h1>
      <p class="hub-subtitle">설치도 없고, 로그인도 없어요. 그냥 플레이하면 돼요.</p>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-item">
        <div class="stat-value" id="totalScore">0</div>
        <div class="stat-label">누적 분노 지수</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalGames">0</div>
        <div class="stat-label">플레이 횟수</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalSmashed">0</div>
        <div class="stat-label">파괴한 것들</div>
      </div>
    </div>

    <!-- Mood Selector -->
    <section class="mood-section">
      <p class="mood-question">지금 기분이 어때?</p>
      <div class="mood-buttons">
        <button class="mood-btn" data-mood="rage" onclick="selectMood('rage')">
          <span class="mood-emoji">😤</span>
          열받아!
        </button>
        <button class="mood-btn" data-mood="bored" onclick="selectMood('bored')">
          <span class="mood-emoji">😎</span>
          심심해~
        </button>
        <button class="mood-btn" data-mood="focus" onclick="selectMood('focus')">
          <span class="mood-emoji">🧠</span>
          집중!
        </button>
        <button class="mood-btn" data-mood="break" onclick="selectMood('break')">
          <span class="mood-emoji">🚬</span>
          휴게실
        </button>
        <button class="mood-btn" data-mood="random" onclick="selectMood('random')">
          <span class="mood-emoji">🎲</span>
          아무거나
        </button>
      </div>
    </section>

    <!-- Rage Level (shown on rage mood) -->
    <section class="rage-level" id="rageLevel">
      <p class="rage-level-title">얼마나 열 받았어요?</p>
      <div class="rage-level-btns">
        <button class="rage-lvl-btn" onclick="setRageLevel(1)">😐 슬슬 짜증</button>
        <button class="rage-lvl-btn" onclick="setRageLevel(2)">😠 꽤 열받음</button>
        <button class="rage-lvl-btn" onclick="setRageLevel(3)">🤬 진짜 화남</button>
        <button class="rage-lvl-btn" onclick="setRageLevel(4)">💀 폭발 직전</button>
      </div>
    </section>

    <!-- Category Tabs -->
    <div class="category-tabs">
      <button class="tab-btn active" data-cat="all" onclick="filterGames('all')">🎮 전체</button>
      <button class="tab-btn" data-cat="stress" onclick="filterGames('stress')">🔥 스트레스 해소</button>
      <button class="tab-btn" data-cat="classic" onclick="filterGames('classic')">🕹️ 클래식</button>
      <button class="tab-btn" data-cat="casual" onclick="filterGames('casual')">🎲 캐주얼</button>
      <button class="tab-btn" data-cat="strategy" onclick="filterGames('strategy')">🧠 전략</button>
      <button class="tab-btn" data-cat="break" onclick="filterGames('break')">🚬 휴게실</button>
    </div>

    <!-- Game Grid -->
    <div class="games-grid" id="gamesGrid"></div>

    <!-- Footer -->
    <footer class="hub-footer">
      <p>오늘도 고생했어요. 내일도 버텨낼 수 있어요 (아마도) 💪</p>
    </footer>
  </div>

  <script>
    const games = [
      // Stress Relief
      { id: 'dish-smash', emoji: '🍽️', title: '접시 날려라', desc: '날아오는 접시를 클릭해서 산산조각 내자!', cat: 'stress', time: '60초', tag: '파괴 쾌감', url: 'games/dish-smash/index.html', ready: true },
      { id: 'stress-ball', emoji: '🔴', title: '스트레스볼 연타', desc: '미친 듯이 클릭해서 스트레스볼을 터뜨려!', cat: 'stress', time: '무제한', tag: '연타 콤보', url: 'games/stress-ball/index.html', ready: true },
      { id: 'rage-type', emoji: '⌨️', title: '분노의 타이핑', desc: '화면의 텍스트를 미친 듯이 쳐서 폭발시켜!', cat: 'stress', time: '90초', tag: '타자 폭발', url: 'games/rage-type/index.html', ready: true },
      { id: 'bubble-wrap', emoji: '🫧', title: '버블랩 터뜨리기', desc: '무한 버블랩을 뻥뻥 터뜨리는 순수한 쾌감', cat: 'stress', time: '무제한', tag: '힐링', url: 'games/bubble-wrap/index.html', ready: true },
      { id: 'paper-rip', emoji: '📄', title: '종이 찢기', desc: '성가신 서류를 시원하게 찢어버려!', cat: 'stress', time: '1분', tag: '드래그 파괴', url: 'games/paper-rip/index.html', ready: true },
      { id: 'boss-throw', emoji: '🎯', title: '상사한테 던지기', desc: '물건을 조준해서 타겟에게 던지자!', cat: 'stress', time: '3분', tag: '투척 물리', url: 'games/boss-throw/index.html', ready: true },
      // Classic
      { id: 'tetris', emoji: '🧱', title: '테트리스', desc: '불멸의 클래식. 블록을 쌓고 줄을 완성해라!', cat: 'classic', time: '3-10분', tag: '블록 퍼즐', url: 'games/tetris/index.html', ready: true },
      { id: 'snake', emoji: '🐍', title: '스네이크', desc: '뱀을 조종해 먹이를 먹고 최장 기록 도전!', cat: 'classic', time: '2-5분', tag: '성장', url: 'games/snake/index.html', ready: true },
      { id: 'space-shooter', emoji: '🚀', title: '스페이스 슈터', desc: '우주선으로 적을 격파하고 탄막을 피해라!', cat: 'classic', time: '3-8분', tag: '슈팅', url: 'games/space-shooter/index.html', ready: true },
      // Casual
      { id: 'memory-match', emoji: '🃏', title: '카드 뒤집기', desc: '같은 그림 카드 쌍을 찾아내는 메모리 게임', cat: 'casual', time: '2-5분', tag: '기억력', url: 'games/memory-match/index.html', ready: true },
      { id: 'rps-plus', emoji: '✊', title: '가위바위보+', desc: 'AI와 심리전! 연승하면 AI가 더 강해져!', cat: 'casual', time: '1-3분', tag: '심리전', url: 'games/rps-plus/index.html', ready: true },
      { id: 'lucky-roulette', emoji: '🎰', title: '행운의 룰렛', desc: '룰렛을 돌려 운을 시험하는 파티 게임!', cat: 'casual', time: '1-5분', tag: '운 시험', url: 'games/lucky-roulette/index.html', ready: true },
      // Strategy
      { id: 'tower-defense', emoji: '🏰', title: '타워 디펜스', desc: '타워를 전략적으로 배치해 적을 막아라!', cat: 'strategy', time: '10-20분', tag: '전략 배치', url: 'games/tower-defense/index.html', ready: true },
      { id: 'resource-tycoon', emoji: '🏘️', title: '자원 관리자', desc: '제한된 자원으로 마을을 성장시켜라!', cat: 'strategy', time: '10-30분', tag: '경영 시뮬', url: 'games/resource-tycoon/index.html', ready: true },
      // Break Room
      { id: 'smoke-break', emoji: '🚬', title: '흡연 구역', desc: '잠깐 멍때리며 연기를 흘려보내는 디지털 휴게실', cat: 'break', time: '1-5분', tag: '한숨 타임', url: 'games/smoke-break/index.html', ready: true },
      { id: 'goam-jar', emoji: '🏺', title: '고암항아리', desc: '이름이나 한마디를 밀어 넣으면 항아리 안에서 메아리치다 잠잠해진다.', cat: 'break', time: '1-3분', tag: '감정 봉인', url: 'games/goam-jar/index.html', ready: true },
    ];

    let currentFilter = 'all';

    function renderGames(filter = 'all') {
      const grid = document.getElementById('gamesGrid');
      const filtered = filter === 'all' ? games : games.filter(g => g.cat === filter);

      grid.innerHTML = filtered.map(g => `
        <a class="game-card ${g.ready ? '' : 'locked'}" href="${g.ready ? g.url : '#'}" ${!g.ready ? 'onclick="event.preventDefault()"' : ''}>
          <div class="game-card-emoji">${g.emoji}</div>
          <div class="game-card-title">${g.title}</div>
          <div class="game-card-desc">${g.desc}</div>
          <div class="game-card-meta">
            <span class="game-card-tag">${g.tag}</span>
            <span>⏱️ ${g.time}</span>
          </div>
        </a>
      `).join('');
    }

    function filterGames(cat) {
      currentFilter = cat;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
      renderGames(cat);
    }

    function selectMood(mood) {
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('active', b.dataset.mood === mood));
      const rageLevel = document.getElementById('rageLevel');

      if (mood === 'rage') {
        rageLevel.classList.add('visible');
        filterGames('stress');
      } else {
        rageLevel.classList.remove('visible');
        if (mood === 'bored') filterGames('classic');
        else if (mood === 'focus') filterGames('strategy');
        else if (mood === 'break') filterGames('break');
        else filterGames('all');
      }
    }

    function setRageLevel(level) {
      filterGames('stress');
      // Could highlight recommended games based on level
    }

    function loadStats() {
      try {
        const data = JSON.parse(localStorage.getItem('rage_game_stats') || '{}');
        document.getElementById('totalScore').textContent = (data.totalAngerScore || 0).toLocaleString();
        document.getElementById('totalGames').textContent = (data.gamesPlayed || 0).toLocaleString();
        const smashed = (data.dishesSmashed || 0) + (data.ballsSmashed || 0) + (data.bubblesPopped || 0);
        document.getElementById('totalSmashed').textContent = smashed.toLocaleString();
      } catch {}
    }

    // Init
    renderGames();
    loadStats();
  </script>
</body>
</html>
