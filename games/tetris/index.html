<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>테트리스 클래식</title>
  <link rel="stylesheet" href="../../shared/styles/common.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .game-wrapper {
      position: relative;
      margin: 0 auto;
    }

    canvas.game-canvas {
      display: block;
      image-rendering: pixelated;
    }

    .mobile-controls {
      display: none;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 10px;
      padding: 0 10px;
      max-width: 800px;
      width: 100%;
    }

    .mobile-controls button {
      flex: 1;
      min-width: 60px;
      max-width: 90px;
      padding: 14px 6px;
      border: 1px solid var(--apple-separator);
      border-radius: var(--radius-sm);
      background: var(--apple-bg-secondary);
      color: var(--apple-label);
      font-size: 20px;
      font-weight: 600;
      font-family: -apple-system, 'Apple SD Gothic Neo', BlinkMacSystemFont, sans-serif;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: var(--shadow-sm);
    }

    .mobile-controls button:active {
      background: var(--apple-bg-tertiary);
      transform: scale(0.93);
    }

    .mobile-controls .hold-btn {
      font-size: 13px;
    }

    @media (pointer: coarse), (max-width: 600px) {
      .mobile-controls {
        display: flex;
      }
    }

    .overlay-card h1 {
      font-size: 32px;
      margin-bottom: 8px;
      color: var(--apple-label);
    }

    .overlay-card p {
      color: var(--apple-label-secondary);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .overlay-card .controls-hint {
      font-size: 13px;
      color: var(--apple-label-secondary);
      margin-top: 16px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="../../index.html">&#9664; 돌아가기</a>
    <button class="sound-btn" id="soundToggle" onclick="window.toggleSound()">&#128266;</button>
  </div>

  <div class="game-wrapper">
    <canvas id="gameCanvas" class="game-canvas" width="800" height="600"></canvas>
  </div>

  <div class="mobile-controls" id="mobileControls">
    <button ontouchstart="mobileMoveLeft(event)" onmousedown="mobileMoveLeft(event)">&#9664;</button>
    <button ontouchstart="mobileRotate(event)" onmousedown="mobileRotate(event)">&#8635;</button>
    <button ontouchstart="mobileSoftDrop(event)" onmousedown="mobileSoftDrop(event)">&#9660;</button>
    <button ontouchstart="mobileHardDrop(event)" onmousedown="mobileHardDrop(event)">&#9632;</button>
    <button ontouchstart="mobileMoveRight(event)" onmousedown="mobileMoveRight(event)">&#9654;</button>
    <button class="hold-btn" ontouchstart="mobileHold(event)" onmousedown="mobileHold(event)">홀드</button>
  </div>

  <!-- Start screen -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-card">
      <h1>테트리스 클래식</h1>
      <p>블록을 쌓아 줄을 완성하세요!</p>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="window._showLeaderboard = () => recordSystem.showLeaderboard('tetris');
    window.startGame()">게임 시작</button>
      </div>
      <div class="controls-hint">
        &#8592;&#8594; 이동 &nbsp; &#8593; 회전 &nbsp; &#8595; 소프트드롭<br>
        Space 하드드롭 &nbsp; C 홀드
      </div>
    </div>
  </div>

  <!-- Result screen -->
  <div class="overlay hidden" id="resultOverlay">
    <div class="overlay-card">
      <h1>게임 오버</h1>
      <div class="result-score" id="resultScore">0</div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-value" id="resultLines">0</div>
          <div class="result-stat-label">라인</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value" id="resultLevel">1</div>
          <div class="result-stat-label">레벨</div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="window._showLeaderboard()">🏆 랭킹</button>
        <button class="btn btn-primary" onclick="window.restartGame()">다시 하기</button>
        <a href="../../index.html" class="btn btn-secondary">메인으로</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { GameLoop } from '../../shared/engine/GameLoop.js';
    import { ParticleSystem } from '../../shared/engine/ParticleSystem.js';
    import { ScreenShake } from '../../shared/engine/ScreenShake.js';
    import { SoundManager } from '../../shared/engine/SoundManager.js';
    import { ScoreManager } from '../../shared/engine/ScoreManager.js';
    import { recordSystem } from '../../shared/ui/RecordSystem.js';

    // ─── Constants ────────────────────────────────────────
    const COLS = 10;
    const ROWS = 20;
    const CANVAS_W = 800;
    const CANVAS_H = 600;
    const BLOCK = Math.floor(CANVAS_H / (ROWS + 2));  // ~27
    const BOARD_W = COLS * BLOCK;
    const BOARD_H = ROWS * BLOCK;
    const BOARD_X = Math.floor((CANVAS_W - BOARD_W) / 2) - 40;
    const BOARD_Y = Math.floor((CANVAS_H - BOARD_H) / 2);

    // Sidebar positions
    const SIDE_RIGHT_X = BOARD_X + BOARD_W + 20;
    const SIDE_LEFT_X = BOARD_X - 130;

    const COLORS = {
      I: '#00f0ff',
      O: '#f0f000',
      T: '#a020f0',
      S: '#00f060',
      Z: '#f03030',
      J: '#3030f0',
      L: '#f0a020',
    };

    const GLOW = {
      I: 'rgba(0,240,255,0.4)',
      O: 'rgba(240,240,0,0.4)',
      T: 'rgba(160,32,240,0.4)',
      S: 'rgba(0,240,96,0.4)',
      Z: 'rgba(240,48,48,0.4)',
      J: 'rgba(48,48,240,0.4)',
      L: 'rgba(240,160,32,0.4)',
    };

    const SHAPES = {
      I: [[0,0],[1,0],[2,0],[3,0]],
      O: [[0,0],[1,0],[0,1],[1,1]],
      T: [[0,0],[1,0],[2,0],[1,1]],
      S: [[1,0],[2,0],[0,1],[1,1]],
      Z: [[0,0],[1,0],[1,1],[2,1]],
      J: [[0,0],[0,1],[1,1],[2,1]],
      L: [[2,0],[0,1],[1,1],[2,1]],
    };

    const LINE_SCORES = [0, 100, 300, 500, 800];

    // ─── Game state ───────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const particles = new ParticleSystem();
    const shake = new ScreenShake();
    const sound = new SoundManager();
    const scoreManager = new ScoreManager();

    let soundEnabled = true;
    let board = [];      // board[r][c] = type string or null
    let current = null;  // { type, cells, x, y }
    let holdPiece = null;
    let holdUsed = false;
    let bag = [];
    let nextPieces = [];
    let score = 0;
    let lines = 0;
    let level = 1;
    let dropInterval = 1.0; // seconds
    let dropTimer = 0;
    let gameState = 'start'; // start | playing | over
    let lineClearFlash = 0;  // countdown
    let flashRows = [];
    let gameLoop = null;

    // ─── Piece helpers ────────────────────────────────────
    function newBag() {
      const types = ['I','O','T','S','Z','J','L'];
      for (let i = types.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [types[i], types[j]] = [types[j], types[i]];
      }
      return types;
    }

    function nextType() {
      if (bag.length === 0) bag = newBag();
      return bag.pop();
    }

    function fillNextPieces() {
      while (nextPieces.length < 3) {
        nextPieces.push(nextType());
      }
    }

    function spawnPiece(type) {
      const cells = SHAPES[type].map(([x,y]) => [x,y]);
      return { type, cells, x: 3, y: 0 };
    }

    function rotateCells(cells, type) {
      if (type === 'O') return cells.map(([x,y]) => [x,y]);
      // Find bounding center and rotate CW
      let cx = 0, cy = 0;
      cells.forEach(([x,y]) => { cx += x; cy += y; });
      cx /= cells.length; cy /= cells.length;
      return cells.map(([x,y]) => {
        const dx = x - cx;
        const dy = y - cy;
        return [Math.round(cx - dy), Math.round(cy + dx)];
      });
    }

    function isValid(cells, px, py) {
      for (const [cx,cy] of cells) {
        const x = px + cx;
        const y = py + cy;
        if (x < 0 || x >= COLS || y >= ROWS) return false;
        if (y >= 0 && board[y][x]) return false;
      }
      return true;
    }

    function ghostY(piece) {
      let gy = piece.y;
      while (isValid(piece.cells, piece.x, gy + 1)) gy++;
      return gy;
    }

    // ─── Board logic ──────────────────────────────────────
    function clearBoard() {
      board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    }

    function lockPiece(piece) {
      for (const [cx,cy] of piece.cells) {
        const x = piece.x + cx;
        const y = piece.y + cy;
        if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
          board[y][x] = piece.type;
        }
      }
    }

    function checkLines() {
      const full = [];
      for (let r = 0; r < ROWS; r++) {
        if (board[r].every(c => c !== null)) full.push(r);
      }
      return full;
    }

    function removeLines(rows) {
      rows.sort((a,b) => b - a);
      for (const r of rows) {
        board.splice(r, 1);
        board.unshift(Array(COLS).fill(null));
      }
    }

    function isGameOver() {
      // Check if any cell in top row is occupied
      return board[0].some(c => c !== null) || board[1].some(c => c !== null);
    }

    // ─── Controls ─────────────────────────────────────────
    function moveLeft() {
      if (!current || gameState !== 'playing') return;
      if (isValid(current.cells, current.x - 1, current.y)) {
        current.x--;
      }
    }

    function moveRight() {
      if (!current || gameState !== 'playing') return;
      if (isValid(current.cells, current.x + 1, current.y)) {
        current.x++;
      }
    }

    function rotate() {
      if (!current || gameState !== 'playing') return;
      const rotated = rotateCells(current.cells, current.type);
      // Wall kick: try offsets
      const kicks = [0, -1, 1, -2, 2];
      for (const dx of kicks) {
        if (isValid(rotated, current.x + dx, current.y)) {
          current.cells = rotated;
          current.x += dx;
          if (soundEnabled) sound.playClick();
          return;
        }
      }
    }

    function softDrop() {
      if (!current || gameState !== 'playing') return;
      if (isValid(current.cells, current.x, current.y + 1)) {
        current.y++;
        score += 1;
        dropTimer = 0;
      }
    }

    function hardDrop() {
      if (!current || gameState !== 'playing') return;
      let dist = 0;
      while (isValid(current.cells, current.x, current.y + 1)) {
        current.y++;
        dist++;
      }
      score += dist * 2;
      lockAndNext();
      if (soundEnabled) sound.playHit();
    }

    function holdAction() {
      if (!current || gameState !== 'playing' || holdUsed) return;
      holdUsed = true;
      const type = current.type;
      if (holdPiece) {
        current = spawnPiece(holdPiece);
        holdPiece = type;
      } else {
        holdPiece = type;
        spawnNext();
      }
      if (soundEnabled) sound.playPop();
    }

    function lockAndNext() {
      lockPiece(current);
      const cleared = checkLines();
      if (cleared.length > 0) {
        // Flash effect
        flashRows = cleared;
        lineClearFlash = 0.3;

        const linesCleared = cleared.length;
        const pts = LINE_SCORES[linesCleared] * level;
        score += pts;
        lines += linesCleared;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.pow(0.85, level - 1);

        // Effects
        const intensity = linesCleared === 4 ? 16 : linesCleared * 4;
        const dur = linesCleared === 4 ? 0.5 : 0.25;
        shake.trigger(intensity, dur);

        const count = linesCleared === 4 ? 80 : linesCleared * 15;
        const effectColors = linesCleared === 4
          ? ['#00f0ff', '#a020f0', '#f0f000', '#ffffff']
          : ['#ffffff', '#00f0ff', '#f0a020'];

        for (const r of cleared) {
          for (let c = 0; c < COLS; c++) {
            const px = BOARD_X + c * BLOCK + BLOCK / 2;
            const py = BOARD_Y + r * BLOCK + BLOCK / 2;
            particles.emit(px, py, Math.floor(count / COLS), { colors: effectColors, speed: linesCleared === 4 ? 6 : 3 });
          }
        }

        if (soundEnabled) {
          if (linesCleared === 4) {
            sound.playExplosion();
            setTimeout(() => sound.playVictory(), 150);
          } else {
            sound.playCombo(linesCleared);
          }
        }

        removeLines(cleared);
      }

      if (isGameOver()) {
        endGame();
        return;
      }

      spawnNext();
      holdUsed = false;
    }

    function spawnNext() {
      fillNextPieces();
      current = spawnPiece(nextPieces.shift());
      fillNextPieces();

      // Check immediate collision (game over)
      if (!isValid(current.cells, current.x, current.y)) {
        endGame();
      }
    }

    // ─── Game flow ────────────────────────────────────────
    function initGame() {
      clearBoard();
      score = 0;
      lines = 0;
      level = 1;
      dropInterval = 1.0;
      dropTimer = 0;
      holdPiece = null;
      holdUsed = false;
      bag = [];
      nextPieces = [];
      current = null;
      flashRows = [];
      lineClearFlash = 0;
      particles.clear();

      fillNextPieces();
      spawnNext();
      gameState = 'playing';
    }

    function endGame() {
      gameState = 'over';
      if (gameLoop) gameLoop.stop();
      if (soundEnabled) sound.playExplosion();

      scoreManager.addScore('tetris', score);
      recordSystem.showSubmitFlow('tetris', score);

      document.getElementById('resultScore').textContent = score.toLocaleString();
      document.getElementById('resultLines').textContent = lines;
      document.getElementById('resultLevel').textContent = level;
      document.getElementById('resultOverlay').classList.remove('hidden');
    }

    // ─── Update / Render ──────────────────────────────────
    function update(dt) {
      if (gameState !== 'playing') return;

      // Line clear flash timer
      if (lineClearFlash > 0) {
        lineClearFlash -= dt;
        if (lineClearFlash <= 0) flashRows = [];
      }

      // Gravity drop
      dropTimer += dt;
      if (dropTimer >= dropInterval) {
        dropTimer = 0;
        if (current && isValid(current.cells, current.x, current.y + 1)) {
          current.y++;
        } else if (current) {
          lockAndNext();
        }
      }

      particles.update(dt);
      shake.update(dt);
    }

    function render() {
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.save();
      shake.apply(ctx);

      // Background
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      drawBoard();
      drawGhost();
      drawCurrent();
      drawSidebar();
      particles.draw(ctx);

      ctx.restore();
    }

    function drawBlock(x, y, type, alpha = 1) {
      const px = BOARD_X + x * BLOCK;
      const py = BOARD_Y + y * BLOCK;
      const color = COLORS[type];
      const glow = GLOW[type];

      ctx.save();
      ctx.globalAlpha = alpha;

      // Glow
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.fillStyle = color;
      ctx.fillRect(px + 1, py + 1, BLOCK - 2, BLOCK - 2);
      ctx.shadowBlur = 0;

      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(px + 1, py + 1, BLOCK - 2, 3);
      ctx.fillRect(px + 1, py + 1, 3, BLOCK - 2);

      // Dark edge
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(px + BLOCK - 3, py + 1, 2, BLOCK - 2);
      ctx.fillRect(px + 1, py + BLOCK - 3, BLOCK - 2, 2);

      ctx.restore();
    }

    function drawSmallBlock(px, py, type, size) {
      const color = COLORS[type];
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 4;
      ctx.fillStyle = color;
      ctx.fillRect(px + 1, py + 1, size - 2, size - 2);
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(px + 1, py + 1, size - 2, 2);
      ctx.restore();
    }

    function drawBoard() {
      // Board background
      ctx.fillStyle = '#0d0d22';
      ctx.fillRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);

      // Grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(BOARD_X, BOARD_Y + r * BLOCK);
        ctx.lineTo(BOARD_X + BOARD_W, BOARD_Y + r * BLOCK);
        ctx.stroke();
      }
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(BOARD_X + c * BLOCK, BOARD_Y);
        ctx.lineTo(BOARD_X + c * BLOCK, BOARD_Y + BOARD_H);
        ctx.stroke();
      }

      // Board border
      ctx.strokeStyle = 'rgba(0,240,255,0.3)';
      ctx.lineWidth = 2;
      ctx.strokeRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);

      // Locked blocks
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (board[r][c]) {
            // Flash effect
            if (flashRows.includes(r) && lineClearFlash > 0) {
              ctx.save();
              ctx.globalAlpha = 0.5 + Math.sin(lineClearFlash * 30) * 0.5;
              ctx.fillStyle = '#ffffff';
              ctx.fillRect(BOARD_X + c * BLOCK, BOARD_Y + r * BLOCK, BLOCK, BLOCK);
              ctx.restore();
            } else {
              drawBlock(c, r, board[r][c]);
            }
          }
        }
      }
    }

    function drawGhost() {
      if (!current || gameState !== 'playing') return;
      const gy = ghostY(current);
      if (gy === current.y) return;
      for (const [cx, cy] of current.cells) {
        drawBlock(current.x + cx, gy + cy, current.type, 0.2);
      }
    }

    function drawCurrent() {
      if (!current || gameState !== 'playing') return;
      for (const [cx, cy] of current.cells) {
        if (current.y + cy >= 0) {
          drawBlock(current.x + cx, current.y + cy, current.type);
        }
      }
    }

    function drawSidebar() {
      const labelStyle = '13px "Noto Sans KR", sans-serif';
      const valueStyle = 'bold 20px "Noto Sans KR", sans-serif';

      // ─── Right side: Score, Level, Lines ────
      let ry = BOARD_Y;

      ctx.font = labelStyle;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('점수', SIDE_RIGHT_X, ry);
      ry += 18;
      ctx.font = valueStyle;
      ctx.fillStyle = '#FFD700';
      ctx.fillText(score.toLocaleString(), SIDE_RIGHT_X, ry);
      ry += 30;

      ctx.font = labelStyle;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('레벨', SIDE_RIGHT_X, ry);
      ry += 18;
      ctx.font = valueStyle;
      ctx.fillStyle = '#00f0ff';
      ctx.fillText(level.toString(), SIDE_RIGHT_X, ry);
      ry += 30;

      ctx.font = labelStyle;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('라인', SIDE_RIGHT_X, ry);
      ry += 18;
      ctx.font = valueStyle;
      ctx.fillStyle = '#f0a020';
      ctx.fillText(lines.toString(), SIDE_RIGHT_X, ry);
      ry += 40;

      // ─── Next 3 pieces ────
      ctx.font = labelStyle;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('다음', SIDE_RIGHT_X, ry);
      ry += 10;

      const smallBlock = 14;
      for (let i = 0; i < Math.min(3, nextPieces.length); i++) {
        const type = nextPieces[i];
        const cells = SHAPES[type];
        // Center the preview
        let minX = 4, maxX = 0, minY = 4, maxY = 0;
        cells.forEach(([x,y]) => {
          minX = Math.min(minX, x); maxX = Math.max(maxX, x);
          minY = Math.min(minY, y); maxY = Math.max(maxY, y);
        });
        const pw = (maxX - minX + 1) * smallBlock;
        const ph = (maxY - minY + 1) * smallBlock;
        const ox = SIDE_RIGHT_X + 5;
        const oy = ry + 6;

        // Preview bg
        ctx.fillStyle = 'rgba(255,255,255,0.03)';
        ctx.fillRect(SIDE_RIGHT_X, ry, 70, ph + 12);
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.strokeRect(SIDE_RIGHT_X, ry, 70, ph + 12);

        for (const [cx, cy] of cells) {
          drawSmallBlock(ox + (cx - minX) * smallBlock, oy + (cy - minY) * smallBlock, type, smallBlock);
        }
        ry += ph + 18;
      }

      // ─── Left side: Hold piece ────
      let ly = BOARD_Y;
      ctx.font = labelStyle;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('홀드', SIDE_LEFT_X, ly);
      ly += 10;

      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.fillRect(SIDE_LEFT_X, ly, 70, 50);
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.strokeRect(SIDE_LEFT_X, ly, 70, 50);

      if (holdPiece) {
        const cells = SHAPES[holdPiece];
        let minX = 4, maxX = 0, minY = 4, maxY = 0;
        cells.forEach(([x,y]) => {
          minX = Math.min(minX, x); maxX = Math.max(maxX, x);
          minY = Math.min(minY, y); maxY = Math.max(maxY, y);
        });
        const ox = SIDE_LEFT_X + 5;
        const oy = ly + 6;
        const smallB = 14;
        for (const [cx, cy] of cells) {
          drawSmallBlock(ox + (cx - minX) * smallB, oy + (cy - minY) * smallB, holdPiece, smallB);
        }
      }
    }

    // ─── Input ────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (gameState !== 'playing') return;
      switch (e.key) {
        case 'ArrowLeft':  e.preventDefault(); moveLeft(); break;
        case 'ArrowRight': e.preventDefault(); moveRight(); break;
        case 'ArrowUp':    e.preventDefault(); rotate(); break;
        case 'ArrowDown':  e.preventDefault(); softDrop(); break;
        case ' ':          e.preventDefault(); hardDrop(); break;
        case 'c': case 'C': holdAction(); break;
      }
    });

    // ─── Mobile controls ──────────────────────────────────
    function preventAndCall(e, fn) {
      e.preventDefault();
      e.stopPropagation();
      if (soundEnabled) sound.resume();
      fn();
    }

    window.mobileMoveLeft = (e) => preventAndCall(e, moveLeft);
    window.mobileMoveRight = (e) => preventAndCall(e, moveRight);
    window.mobileRotate = (e) => preventAndCall(e, rotate);
    window.mobileSoftDrop = (e) => preventAndCall(e, softDrop);
    window.mobileHardDrop = (e) => preventAndCall(e, hardDrop);
    window.mobileHold = (e) => preventAndCall(e, holdAction);

    // ─── Global API ───────────────────────────────────────
    window.startGame = () => {
      sound.init();
      sound.resume();
      document.getElementById('startOverlay').classList.add('hidden');
      document.getElementById('resultOverlay').classList.add('hidden');
      initGame();
      if (gameLoop) gameLoop.stop();
      gameLoop = new GameLoop({ update, render });
      gameLoop.start();
    };

    window.restartGame = () => {
      document.getElementById('resultOverlay').classList.add('hidden');
      initGame();
      if (gameLoop) gameLoop.stop();
      gameLoop = new GameLoop({ update, render });
      gameLoop.start();
    };

    window.toggleSound = () => {
      soundEnabled = !soundEnabled;
      document.getElementById('soundToggle').innerHTML = soundEnabled ? '&#128266;' : '&#128263;';
      if (soundEnabled) {
        sound.init();
        sound.resume();
      }
    };

    // Initial render of empty board behind start screen
    render();
  </script>
</body>
</html>
