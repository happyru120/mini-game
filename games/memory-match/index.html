<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🃏 카드 뒤집기 — Memory Match</title>
  <link rel="stylesheet" href="../../shared/styles/common.css">
  <style>
    body { background: #0D0D1A; }

    .game-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 10px;
      position: relative;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
    }

    .back-btn {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .back-btn:hover { color: var(--white-pop); }

    .sound-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--white-pop);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }

    /* Start Screen */
    .start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      gap: 12px;
    }
    .start-overlay h1 { font-size: 52px; margin-bottom: 4px; }
    .start-overlay h2 { font-size: 28px; font-weight: 900; }
    .start-overlay p {
      color: var(--text-secondary);
      font-size: 15px;
      margin-bottom: 16px;
      text-align: center;
      line-height: 1.6;
    }

    .difficulty-select {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 8px;
    }

    .diff-btn {
      padding: 14px 28px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      background: var(--dark-card);
      color: var(--white-pop);
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .diff-btn:hover {
      border-color: var(--energy-orange);
      background: rgba(255,140,0,0.15);
    }
    .diff-btn.selected {
      border-color: var(--energy-orange);
      background: rgba(255,140,0,0.25);
      box-shadow: 0 0 16px rgba(255,140,0,0.3);
    }
    .diff-label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Card Grid */
    .card-grid {
      display: grid;
      gap: 10px;
      padding: 10px;
      max-width: 600px;
      margin: 0 auto;
      perspective: 1000px;
    }

    .card {
      aspect-ratio: 1;
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    .card.flipped {
      transform: rotateY(180deg);
    }
    .card.matched {
      transform: rotateY(180deg);
      pointer-events: none;
    }
    .card.matched .card-front {
      box-shadow: 0 0 20px rgba(0,200,83,0.5);
      border-color: var(--success-green);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 2px solid rgba(255,255,255,0.1);
    }

    .card-back {
      background: linear-gradient(145deg, var(--dark-card), #0a2040);
      font-size: 28px;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
    }
    .card-back::after {
      content: '?';
      font-weight: 900;
      color: rgba(255,255,255,0.15);
      font-size: 32px;
    }

    .card-front {
      background: linear-gradient(145deg, #1a2a4a, var(--dark-surface));
      transform: rotateY(180deg);
      font-size: clamp(28px, 6vw, 48px);
      transition: box-shadow 0.3s, border-color 0.3s;
    }

    /* Match sparkle */
    @keyframes sparkle {
      0% { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.1); }
      100% { transform: rotateY(180deg) scale(1); }
    }
    .card.matched {
      animation: sparkle 0.5s ease-out;
    }

    /* No-match shake */
    @keyframes noMatch {
      0%, 100% { transform: rotateY(180deg) translateX(0); }
      20% { transform: rotateY(180deg) translateX(-6px); }
      40% { transform: rotateY(180deg) translateX(6px); }
      60% { transform: rotateY(180deg) translateX(-4px); }
      80% { transform: rotateY(180deg) translateX(4px); }
    }
    .card.no-match {
      animation: noMatch 0.4s ease-out;
    }

    /* Effects Canvas */
    #effectsCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    /* HUD custom */
    .game-hud {
      max-width: 600px;
    }
    .hud-item {
      text-align: center;
    }
    .hud-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .hud-value {
      font-size: 24px;
      font-weight: 900;
    }
    .hud-moves { color: var(--energy-orange); }
    .hud-time { color: var(--relief-yellow); }
    .hud-pairs { color: var(--success-green); }

    /* Stars */
    .stars {
      font-size: 40px;
      margin: 12px 0;
      letter-spacing: 8px;
    }
    .star-empty { opacity: 0.25; }

    /* Result extras */
    .result-time {
      font-size: 36px;
      font-weight: 900;
      color: var(--relief-yellow);
      margin: 8px 0;
    }

    @media (max-width: 480px) {
      .card-grid { gap: 6px; padding: 6px; }
      .diff-btn { padding: 10px 18px; font-size: 13px; }
      .hud-value { font-size: 20px; }
    }
  </style>
</head>
<body>
  <!-- Start Screen -->
  <div class="start-overlay" id="startScreen">
    <h1>🃏</h1>
    <h2>카드 뒤집기</h2>
    <p>짝이 맞는 카드를 찾아 뒤집어 보세요!<br>적은 시도로 빠르게 완성하면 높은 별점!</p>
    <div class="difficulty-select" id="difficultySelect">
      <button class="diff-btn selected" data-diff="easy" onclick="selectDifficulty('easy')">
        쉬움<span class="diff-label">4 x 3</span>
      </button>
      <button class="diff-btn" data-diff="normal" onclick="selectDifficulty('normal')">
        보통<span class="diff-label">4 x 4</span>
      </button>
      <button class="diff-btn" data-diff="hard" onclick="selectDifficulty('hard')">
        어려움<span class="diff-label">5 x 4</span>
      </button>
    </div>
    <button class="btn btn-primary" onclick="startGame()" style="font-size:20px; padding:18px 48px; margin-top: 8px;">
      짝 찾기 시작!
    </button>
  </div>

  <!-- Result Screen -->
  <div class="result-overlay" id="resultScreen" style="display:none;">
    <div class="result-card">
      <div class="stars" id="resultStars"></div>
      <h2 style="font-size: 24px; margin-bottom: 8px;">완료!</h2>
      <div class="result-time" id="resultTime"></div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-value" id="resultMoves">0</div>
          <div class="result-stat-label">시도</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value" id="resultPairs">0</div>
          <div class="result-stat-label">짝</div>
        </div>
      </div>
      <p class="result-message" id="resultMessage"></p>
      <div class="result-buttons">
        <button class="btn btn-secondary" onclick="window._showLeaderboard()">🏆 랭킹</button>
        <button class="btn btn-primary" onclick="restartGame()">다시 하기</button>
        <a href="../../index.html" class="btn btn-secondary">돌아가기</a>
      </div>
    </div>
  </div>

  <!-- Game -->
  <div class="game-wrapper">
    <div class="top-bar">
      <a href="../../index.html" class="back-btn">← 돌아가기</a>
      <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊 사운드 ON</button>
    </div>
    <div class="game-hud" id="gameHud" style="display:none;">
      <div class="hud-item">
        <div class="hud-label">시도</div>
        <div class="hud-value hud-moves" id="hudMoves">0</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">시간</div>
        <div class="hud-value hud-time" id="hudTime">0:00</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">짝 찾기</div>
        <div class="hud-value hud-pairs" id="hudPairs">0 / 0</div>
      </div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <canvas id="effectsCanvas"></canvas>

  <script type="module">
    import { ParticleSystem } from '../../shared/engine/ParticleSystem.js';
    import { ScreenShake } from '../../shared/engine/ScreenShake.js';
    import { SoundManager } from '../../shared/engine/SoundManager.js';
    import { ScoreManager } from '../../shared/engine/ScoreManager.js';
    import { recordSystem } from '../../shared/ui/RecordSystem.js';

    // ── Shared engine instances ──
    const particles = new ParticleSystem();
    const screenShake = new ScreenShake();
    const sound = new SoundManager();
    const scoreManager = new ScoreManager();

    // ── Canvas setup ──
    const canvas = document.getElementById('effectsCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ── Game config ──
    const EMOJIS = ['🍎','🍊','🍋','🍇','🍓','🍒','🍑','🥝','🍌','🫐'];

    const DIFFICULTIES = {
      easy:   { cols: 4, rows: 3, pairs: 6 },
      normal: { cols: 4, rows: 4, pairs: 8 },
      hard:   { cols: 5, rows: 4, pairs: 10 },
    };

    // Star thresholds (max moves for 3 stars / 2 stars, rest = 1 star)
    const STAR_THRESHOLDS = {
      easy:   { three: 9,  two: 14 },
      normal: { three: 14, two: 22 },
      hard:   { three: 18, two: 28 },
    };

    // ── Game state ──
    let difficulty = 'easy';
    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let totalPairs = 0;
    let moves = 0;
    let timerStart = 0;
    let timerInterval = null;
    let elapsedSeconds = 0;
    let isLocked = false;
    let gameActive = false;
    let soundEnabled = true;

    // ── Difficulty selection ──
    function selectDifficulty(diff) {
      difficulty = diff;
      document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.diff === diff);
      });
    }
    window.selectDifficulty = selectDifficulty;

    // ── Shuffle ──
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // ── Build grid ──
    function buildGrid() {
      const config = DIFFICULTIES[difficulty];
      totalPairs = config.pairs;
      matchedPairs = 0;
      moves = 0;
      flippedCards = [];
      isLocked = false;

      const selectedEmojis = shuffle([...EMOJIS]).slice(0, config.pairs);
      const cardData = shuffle([...selectedEmojis, ...selectedEmojis]);

      const grid = document.getElementById('cardGrid');
      grid.innerHTML = '';
      grid.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;

      cards = cardData.map((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = i;
        card.dataset.emoji = emoji;
        card.innerHTML = `
          <div class="card-face card-back"></div>
          <div class="card-face card-front">${emoji}</div>
        `;
        card.addEventListener('click', () => flipCard(card));
        grid.appendChild(card);
        return card;
      });

      updateHUD();
    }

    // ── Card flip logic ──
    function flipCard(card) {
      if (isLocked) return;
      if (card.classList.contains('flipped')) return;
      if (card.classList.contains('matched')) return;
      if (flippedCards.length >= 2) return;

      card.classList.add('flipped');
      flippedCards.push(card);

      if (soundEnabled) sound.playClick();

      if (flippedCards.length === 2) {
        moves++;
        checkMatch();
      }

      updateHUD();
    }

    function checkMatch() {
      const [a, b] = flippedCards;
      const isMatch = a.dataset.emoji === b.dataset.emoji;

      if (isMatch) {
        // Match found
        matchedPairs++;
        a.classList.add('matched');
        b.classList.add('matched');

        // Sparkle particles at both card positions
        emitMatchParticles(a);
        emitMatchParticles(b);

        if (soundEnabled) sound.playCombo(matchedPairs);

        flippedCards = [];
        updateHUD();

        if (matchedPairs === totalPairs) {
          setTimeout(onAllMatched, 500);
        }
      } else {
        // No match
        isLocked = true;
        a.classList.add('no-match');
        b.classList.add('no-match');

        if (soundEnabled) sound.playHit();

        setTimeout(() => {
          a.classList.remove('flipped', 'no-match');
          b.classList.remove('flipped', 'no-match');
          flippedCards = [];
          isLocked = false;
        }, 1000);
      }
    }

    // ── Particle effects ──
    function emitMatchParticles(card) {
      const rect = card.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      particles.emit(cx, cy, 15, {
        colors: ['#00C853', '#FFD700', '#00E676', '#FFFFFF'],
        speed: 3 + Math.random() * 3,
        size: 3 + Math.random() * 4,
        gravity: 0.08,
        decay: 0.02,
        shape: 'circle',
      });
    }

    function emitConfetti() {
      const w = canvas.width;
      const h = canvas.height;
      const colors = ['#FF3B3B', '#FF8C00', '#FFD700', '#00C853', '#2196F3', '#E040FB'];
      for (let i = 0; i < 120; i++) {
        setTimeout(() => {
          particles.emit(
            Math.random() * w,
            -20,
            1,
            {
              colors,
              speed: 1 + Math.random() * 3,
              angle: Math.PI / 2 + (Math.random() - 0.5) * 0.8,
              size: 4 + Math.random() * 6,
              gravity: 0.06 + Math.random() * 0.04,
              decay: 0.005 + Math.random() * 0.008,
              shape: Math.random() > 0.5 ? 'rect' : 'circle',
            }
          );
        }, i * 25);
      }
    }

    // ── Timer ──
    function startTimer() {
      timerStart = Date.now();
      elapsedSeconds = 0;
      timerInterval = setInterval(() => {
        elapsedSeconds = Math.floor((Date.now() - timerStart) / 1000);
        updateHUD();
      }, 250);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      elapsedSeconds = Math.floor((Date.now() - timerStart) / 1000);
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // ── HUD ──
    function updateHUD() {
      document.getElementById('hudMoves').textContent = moves;
      document.getElementById('hudTime').textContent = formatTime(elapsedSeconds);
      document.getElementById('hudPairs').textContent = `${matchedPairs} / ${totalPairs}`;
    }

    // ── Stars ──
    function getStars() {
      const t = STAR_THRESHOLDS[difficulty];
      if (moves <= t.three) return 3;
      if (moves <= t.two) return 2;
      return 1;
    }

    function renderStars(count) {
      let s = '';
      for (let i = 0; i < 3; i++) {
        s += i < count
          ? '<span>⭐</span>'
          : '<span class="star-empty">⭐</span>';
      }
      return s;
    }

    // ── Game completion ──
    function onAllMatched() {
      stopTimer();
      gameActive = false;

      if (soundEnabled) sound.playVictory();
      emitConfetti();
      screenShake.trigger(6, 0.4);

      // Save score
      scoreManager.addScore('memory-match', Math.max(0, 10000 - moves * 100 - elapsedSeconds * 10));
      recordSystem.showSubmitFlow('memory-match', Math.max(0, 10000 - moves * 100 - elapsedSeconds * 10));

      const stars = getStars();

      // Show result screen
      setTimeout(() => {
        document.getElementById('resultStars').innerHTML = renderStars(stars);
        document.getElementById('resultTime').textContent = formatTime(elapsedSeconds);
        document.getElementById('resultMoves').textContent = moves;
        document.getElementById('resultPairs').textContent = totalPairs;

        const messages = {
          3: '완벽해요! 기억력 천재! 🧠',
          2: '잘했어요! 조금만 더 집중하면 완벽!',
          1: '다음에는 더 잘할 수 있을 거예요!',
        };
        document.getElementById('resultMessage').textContent = messages[stars];
        document.getElementById('resultScreen').style.display = 'flex';
      }, 1500);
    }

    // ── Start / Restart ──
    function startGame() {
      sound.init();
      sound.resume();
      if (soundEnabled) sound.playClick();

      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('resultScreen').style.display = 'none';
      document.getElementById('gameHud').style.display = 'flex';

      buildGrid();
      startTimer();
      gameActive = true;
    }
    window._showLeaderboard = () => recordSystem.showLeaderboard('memory-match');
    window.startGame = startGame;

    function restartGame() {
      if (soundEnabled) sound.playClick();
      document.getElementById('resultScreen').style.display = 'none';
      document.getElementById('startScreen').style.display = 'flex';
    }
    window.restartGame = restartGame;

    // ── Sound toggle ──
    function toggleSound() {
      soundEnabled = !soundEnabled;
      const btn = document.getElementById('soundBtn');
      btn.textContent = soundEnabled ? '🔊 사운드 ON' : '🔇 사운드 OFF';
      if (soundEnabled) {
        sound.init();
        sound.resume();
      }
    }
    window.toggleSound = toggleSound;

    // ── Animation loop ──
    let lastTime = 0;
    function animate(time) {
      const dt = Math.min((time - lastTime) / 1000, 0.1);
      lastTime = time;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      screenShake.update(dt);
      particles.update(dt);

      ctx.save();
      screenShake.apply(ctx);
      particles.draw(ctx);
      ctx.restore();

      // Apply screen shake to game wrapper
      const wrapper = document.querySelector('.game-wrapper');
      if (screenShake.offsetX || screenShake.offsetY) {
        wrapper.style.transform = `translate(${screenShake.offsetX}px, ${screenShake.offsetY}px)`;
      } else {
        wrapper.style.transform = '';
      }

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
