<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>쿠키샵 3D</title>
  <link rel="stylesheet" href="../../shared/styles/common.css">
  <style>
    :root {
      --cs-cream: #F7F2E9;
      --cs-card: #FFFDF8;
      --cs-ink: #3B2F26;
      --cs-ink-soft: #93836F;
      --cs-line: #E9DFCE;
      --cs-butter: #E8A13C;
      --cs-butter-deep: #C87F1B;
      --cs-sage: #8FA98B;
      --cs-terra: #D9704C;
      --cs-shadow: 0 18px 40px -18px rgba(59, 47, 38, 0.35);
    }
    .game-wrapper {
      max-width: 820px;
      margin: 0 auto;
      padding: 10px;
    }
    .stage-wrap {
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--cs-shadow);
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }
    canvas.game-canvas { display: block; background: #EFE6D8; border-radius: 0; border: none; }

    /* ---------- shared bits ---------- */
    .cs-eyebrow {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cs-ink-soft);
      font-weight: 700;
    }
    .cs-panel {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(59, 47, 38, 0.28);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      z-index: 20;
    }
    .cs-sheet {
      width: min(620px, calc(100% - 36px));
      max-height: calc(100% - 36px);
      overflow-y: auto;
      background: var(--cs-card);
      color: var(--cs-ink);
      border: 1px solid var(--cs-line);
      border-radius: 24px;
      padding: 22px 24px 20px;
      box-shadow: var(--cs-shadow);
    }
    .cs-sheet h2 { font-size: 21px; font-weight: 800; margin: 4px 0 2px; letter-spacing: -0.01em; }
    .cs-sub { color: var(--cs-ink-soft); font-size: 13px; line-height: 1.65; }

    .cs-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .cs-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--cs-cream);
      border: 1px solid var(--cs-line);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--cs-ink);
      white-space: nowrap;
    }
    .cs-chip.gold { background: #FBF0DC; border-color: #EBD5AC; color: var(--cs-butter-deep); }

    .cs-btn {
      appearance: none;
      border: none;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      border-radius: 16px;
      padding: 13px 20px;
      transition: transform .12s ease, box-shadow .12s ease, background .12s;
      letter-spacing: -0.01em;
    }
    .cs-btn:active { transform: scale(0.97); }
    .cs-btn.primary {
      background: var(--cs-ink);
      color: #FFF9EE;
      width: 100%;
      font-size: 15.5px;
      box-shadow: 0 10px 24px -12px rgba(59,47,38,.6);
    }
    .cs-btn.primary:hover { background: #52443A; }
    .cs-btn.ghost {
      background: var(--cs-cream);
      color: var(--cs-ink);
      border: 1px solid var(--cs-line);
      font-size: 13px;
      padding: 9px 14px;
    }
    .cs-btn.tiny {
      padding: 4px 12px;
      border-radius: 10px;
      background: var(--cs-cream);
      border: 1px solid var(--cs-line);
      font-size: 15px;
      font-weight: 800;
      color: var(--cs-ink);
      line-height: 1.2;
    }
    .cs-btn:disabled { opacity: 0.35; cursor: default; }

    /* ---------- tabs ---------- */
    .cs-tabs { display: flex; gap: 6px; margin: 14px 0 12px; }
    .cs-tab {
      flex: 1;
      text-align: center;
      padding: 9px 4px;
      border-radius: 13px;
      font-size: 13px;
      font-weight: 700;
      color: var(--cs-ink-soft);
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all .12s;
    }
    .cs-tab.on { background: var(--cs-cream); color: var(--cs-ink); border-color: var(--cs-line); }
    .cs-tab .n {
      display: inline-block; min-width: 17px; padding: 0 4px; margin-left: 3px;
      background: var(--cs-butter); color: #fff; border-radius: 999px; font-size: 10.5px; line-height: 17px;
    }

    /* ---------- lists ---------- */
    .cs-list { display: flex; flex-direction: column; gap: 8px; }
    .cs-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--cs-cream);
      border: 1px solid var(--cs-line);
      border-radius: 16px;
      padding: 10px 14px;
    }
    .cs-item .ico {
      width: 40px; height: 40px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 21px; background: #fff; border: 1px solid var(--cs-line);
      flex-shrink: 0;
    }
    .cs-item .body { flex: 1; min-width: 0; }
    .cs-item .name { font-size: 14px; font-weight: 800; }
    .cs-item .meta { font-size: 12px; color: var(--cs-ink-soft); margin-top: 1px; }
    .cs-item .ctrl { display: flex; align-items: center; gap: 8px; }
    .cs-item .qty { min-width: 22px; text-align: center; font-weight: 800; font-size: 15px; }

    /* ---------- recipe lab ---------- */
    .lab-slots { display: flex; gap: 10px; justify-content: center; margin: 14px 0; }
    .lab-slot {
      width: 64px; height: 64px; border-radius: 18px;
      border: 2px dashed #D9CCB4;
      background: var(--cs-cream);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; cursor: pointer; transition: all .12s;
    }
    .lab-slot.filled { border-style: solid; border-color: var(--cs-butter); background: #FBF0DC; }
    .lab-pool { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 14px; }
    .lab-ing {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      width: 64px; padding: 8px 0 6px; border-radius: 14px;
      background: var(--cs-cream); border: 1px solid var(--cs-line);
      cursor: pointer; font-size: 22px; transition: all .12s;
    }
    .lab-ing:hover { transform: translateY(-2px); }
    .lab-ing span { font-size: 10.5px; font-weight: 700; color: var(--cs-ink-soft); }
    .lab-msg { text-align: center; font-size: 13px; font-weight: 700; min-height: 20px; margin-bottom: 8px; }
    .recipe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .recipe-card {
      background: var(--cs-cream); border: 1px solid var(--cs-line); border-radius: 14px;
      padding: 9px 12px; font-size: 12.5px;
    }
    .recipe-card .rn { font-weight: 800; font-size: 13px; }
    .recipe-card .rc { color: var(--cs-ink-soft); margin-top: 1px; }
    .recipe-card.locked { opacity: .55; }
    .recipe-card.trend { border-color: var(--cs-butter); background: #FBF0DC; }

    /* ---------- HUD (day) ---------- */
    .cs-hud {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 30px;
      background: linear-gradient(rgba(40,30,22,.5), transparent);
      z-index: 10; pointer-events: none;
      color: #FFF9EE;
    }
    .cs-hud .hud-block { display: flex; flex-direction: column; gap: 1px; }
    .cs-hud .hud-eyebrow { font-size: 10px; letter-spacing: .2em; opacity: .75; font-weight: 700; }
    .cs-hud .hud-main { font-size: 17px; font-weight: 800; text-shadow: 0 1px 6px rgba(0,0,0,.3); }
    .cs-timebar {
      position: absolute; left: 18px; right: 18px; top: 62px;
      height: 4px; border-radius: 99px; background: rgba(255,255,255,.25);
      overflow: hidden;
    }
    .cs-timebar > div { height: 100%; border-radius: 99px; background: #FFE1A8; width: 100%; transition: width .5s linear; }

    /* ---------- serve bar ---------- */
    .serve-bar {
      position: absolute; left: 0; right: 0; bottom: 0;
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: flex-end;
      padding: 26px 14px 14px;
      background: linear-gradient(transparent, rgba(40,30,22,.55));
      z-index: 10;
    }
    .serve-card {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      min-width: 74px; padding: 9px 8px 7px;
      background: var(--cs-card); border: 1px solid var(--cs-line); border-radius: 16px;
      cursor: pointer; transition: transform .1s;
      box-shadow: 0 8px 18px -10px rgba(0,0,0,.5);
    }
    .serve-card:hover { transform: translateY(-3px); }
    .serve-card.empty { opacity: .4; filter: grayscale(.6); }
    .serve-card .dot { width: 30px; height: 30px; border-radius: 50%; position: relative; }
    .serve-card .dot i {
      position: absolute; width: 5px; height: 5px; border-radius: 50%; background: rgba(59,47,38,.5);
    }
    .serve-card .nm { font-size: 11px; font-weight: 800; color: var(--cs-ink); white-space: nowrap; }
    .serve-card .ct { font-size: 11px; font-weight: 700; color: var(--cs-ink-soft); }
    .serve-card.shake { animation: csShake .3s; }
    @keyframes csShake { 25% { transform: translateX(-4px);} 75% { transform: translateX(4px);} }

    /* ---------- floats ---------- */
    .float-layer { position: absolute; inset: 0; pointer-events: none; z-index: 15; overflow: hidden; }
    .cs-float {
      position: absolute; font-weight: 800; font-size: 15px;
      text-shadow: 0 1px 4px rgba(0,0,0,.25);
      animation: csFloat 1.1s ease-out forwards;
    }
    @keyframes csFloat {
      0% { opacity: 0; transform: translateY(6px) scale(.8); }
      15% { opacity: 1; transform: translateY(0) scale(1.05); }
      100% { opacity: 0; transform: translateY(-44px) scale(1); }
    }

    /* ---------- town mode ---------- */
    .cs-toast {
      position: absolute; top: 74px; left: 50%; transform: translateX(-50%);
      max-width: 78%;
      background: rgba(255, 253, 248, 0.96);
      border: 1px solid var(--cs-line);
      color: var(--cs-ink);
      border-radius: 16px;
      padding: 11px 18px;
      font-size: 13px; font-weight: 700; line-height: 1.55;
      box-shadow: var(--cs-shadow);
      z-index: 18;
      text-align: center;
      opacity: 0;
      transition: opacity .35s ease, transform .35s ease;
      pointer-events: none;
    }
    .cs-toast.show { opacity: 1; transform: translateX(-50%) translateY(4px); }
    .town-hint {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(59, 47, 38, 0.55);
      color: #FFF6E6;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 12px; font-weight: 700;
      z-index: 10;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .cs-btn.close {
      background: var(--cs-cream);
      color: var(--cs-ink);
      border: 1px solid var(--cs-line);
      width: 100%;
      font-size: 14px;
      margin-top: 8px;
    }

    /* ---------- stars ---------- */
    .star-track {
      height: 8px; background: var(--cs-cream); border: 1px solid var(--cs-line);
      border-radius: 99px; overflow: hidden; margin-top: 6px;
    }
    .star-track > div { height: 100%; background: linear-gradient(90deg, var(--cs-butter), var(--cs-terra)); border-radius: 99px; transition: width .6s ease; }
    .star-row { font-size: 17px; letter-spacing: 2px; }

    .ev-stat { display: flex; justify-content: space-between; padding: 7px 2px; font-size: 13.5px; border-bottom: 1px dashed var(--cs-line); }
    .ev-stat b { font-weight: 800; }
    .ev-stat:last-child { border-bottom: none; }

    .start-overlay h1 { font-size: 40px; margin-bottom: 8px; letter-spacing: -0.02em; }
    .start-overlay p {
      color: var(--apple-label-secondary);
      font-size: 15px; margin-bottom: 20px; text-align: center; line-height: 1.75;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="top-bar">
      <a href="../../index.html" class="back-btn">&larr; &nbsp;돌아가기</a>
      <button class="sound-btn" onclick="window.toggleSound()">사운드 ON</button>
    </div>

    <div class="stage-wrap" id="stageWrap">
      <canvas id="gameCanvas" class="game-canvas" width="800" height="600"></canvas>

      <!-- Day HUD -->
      <div class="cs-hud" id="dayHud" style="display:none;">
        <div class="hud-block">
          <div class="hud-eyebrow" id="hudDay">DAY 01 · OPEN</div>
          <div class="hud-main" id="hudMoney">🪙 0</div>
        </div>
        <div class="hud-block" style="text-align:right;">
          <div class="hud-eyebrow">REPUTATION</div>
          <div class="hud-main" id="hudStars">☆☆☆☆☆</div>
        </div>
        <div class="cs-timebar"><div id="hudTime"></div></div>
      </div>

      <!-- Serve bar -->
      <div class="serve-bar" id="serveBar" style="display:none;"></div>

      <!-- Morning panel -->
      <div class="cs-panel" id="morningPanel" style="display:none;">
        <div class="cs-sheet">
          <div class="cs-row">
            <div>
              <div class="cs-eyebrow" id="mEyebrow">DAY 01 · MORNING</div>
              <h2 id="mTitle">아침 준비</h2>
            </div>
            <div style="display:flex; flex-direction:column; gap:5px; align-items:flex-end;">
              <span class="cs-chip gold" id="mMoney">🪙 60</span>
              <span class="cs-chip" id="mStars">☆☆☆☆☆</span>
            </div>
          </div>
          <div class="cs-sub" id="mTrend" style="margin-top:8px;"></div>

          <div class="cs-tabs" id="poiTabs" style="display:none;">
            <button class="cs-tab on" data-tab="lab" onclick="window._tab('lab')">레시피 연구</button>
            <button class="cs-tab" data-tab="bake" onclick="window._tab('bake')">베이킹<span class="n" id="bakeN" style="display:none;">0</span></button>
          </div>

          <div id="tabBody" style="margin-top:12px;"></div>

          <div style="margin-top:16px;">
            <button class="cs-btn primary" id="openBtn" onclick="window._openShop()" style="display:none;">영업 시작</button>
            <button class="cs-btn close" id="poiCloseBtn" onclick="window._closePoi()">나가기</button>
          </div>
        </div>
      </div>

      <!-- Evening panel -->
      <div class="cs-panel" id="eveningPanel" style="display:none;">
        <div class="cs-sheet">
          <div class="cs-eyebrow" id="eEyebrow">DAY 01 · CLOSED</div>
          <h2>오늘의 정산</h2>
          <div id="eBody" style="margin-top:10px;"></div>
          <div style="margin-top:16px;">
            <button class="cs-btn primary" id="nextDayBtn" onclick="window._nextDay()">다음 날로</button>
          </div>
        </div>
      </div>

      <div class="cs-toast" id="toast"></div>
      <div class="town-hint" id="townHint" style="display:none;">🚶 방향키·WASD 또는 화면 탭으로 이동 · 건물 앞에 서면 들어가요</div>

      <div class="float-layer" id="floatLayer"></div>
    </div>
  </div>

  <!-- Start Screen -->
  <div class="start-overlay" id="startScreen">
    <h1>🍪 쿠키샵 3D</h1>
    <p>
      골목 끝, 작은 쿠키샵을 물려받았다.<br>
      재료를 조합해 나만의 레시피를 발견하고, 손님을 사로잡자.<br>
      <b>30일 안에 별 다섯 개</b>를 모으면 명예의 전당!<br>
      아침엔 준비, 낮엔 서빙 — 주문에 맞는 쿠키 카드를 탭!
    </p>
    <button class="btn btn-primary" onclick="window._showLeaderboard = () => recordSystem.showLeaderboard(GAME_ID);
    window.startGame()">오픈 준비하기</button>
  </div>

  <!-- Game End Screen -->
  <div class="result-overlay" id="gameOverScreen" style="display:none;">
    <div class="result-card">
      <h2 id="resultTitle">시즌 종료</h2>
      <div class="result-score" id="finalScore">0</div>
      <div class="result-stats" id="resultStats"></div>
      <div class="result-message" id="resultMessage"></div>
      <div class="result-buttons">
        <button class="btn btn-secondary" onclick="window._showLeaderboard()">🏆 랭킹</button>
        <button class="btn btn-primary" onclick="window.restartGame()">다시 하기</button>
        <a href="../../index.html" class="btn btn-secondary">메인으로</a>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from '../../shared/vendor/three.module.min.js';
    import { GameLoop } from '../../shared/engine/GameLoop.js';
    import { SoundManager } from '../../shared/engine/SoundManager.js';
    import { ScoreManager } from '../../shared/engine/ScoreManager.js';
    import { recordSystem } from '../../shared/ui/RecordSystem.js';

    const GAME_ID = 'cookie-shop';
    window.GAME_ID = GAME_ID;
    const W = 800, H = 600;
    const canvas = document.getElementById('gameCanvas');

    // ============================================================
    // Sound
    // ============================================================
    class ShopSound extends SoundManager {
      playChime() { this.init(); this._tone(880, 0.12, 'sine', 0.16); setTimeout(() => this._tone(1175, 0.16, 'sine', 0.14), 110); }
      playCoin() { this.init(); this._tone(988, 0.06, 'square', 0.12); setTimeout(() => this._tone(1319, 0.1, 'square', 0.1), 60); }
      playServe() { this.init(); this._tone(660, 0.07, 'triangle', 0.18); this._tone(880, 0.1, 'triangle', 0.12); }
      playAngry() { this.init(); this._tone(180, 0.18, 'sawtooth', 0.2); }
      playDiscover() { this.init(); [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => this._tone(f, 0.16, 'sine', 0.2), i * 90)); }
      playBake() { this.init(); this._tone(392, 0.1, 'triangle', 0.16); setTimeout(() => this._tone(494, 0.12, 'triangle', 0.13), 90); }
      playFail() { this.init(); this._tone(330, 0.1, 'sine', 0.15); setTimeout(() => this._tone(262, 0.14, 'sine', 0.13), 100); }
    }
    const sound = new ShopSound();
    const scoreManager = new ScoreManager();
    let soundEnabled = true;

    // ============================================================
    // Data
    // ============================================================
    const INGREDIENTS = {
      flour:  { name: '밀가루', emoji: '🌾', price: 2, shop: true },
      butter: { name: '버터',   emoji: '🧈', price: 3, shop: true },
      sugar:  { name: '설탕',   emoji: '🍬', price: 2, shop: true },
      milk:   { name: '우유',   emoji: '🥛', price: 3, shop: true },
      choco:  { name: '초콜릿', emoji: '🍫', price: 5, shop: true },
      berry:  { name: '딸기',   emoji: '🍓', price: 7, shop: true },
      matcha: { name: '말차',   emoji: '🍵', price: 8, shop: true },
      honey:  { name: '꿀',     emoji: '🍯', price: 0, shop: false },
    };

    const RECIPES = [
      { id: 'butter',      name: '버터쿠키',      combo: ['flour', 'butter', 'sugar'],  sell: 10, tier: 1, color: '#D9A45B' },
      { id: 'milkcream',   name: '우유크림쿠키',  combo: ['flour', 'sugar', 'milk'],    sell: 14, tier: 2, color: '#F2E8DC' },
      { id: 'choco',       name: '초코칩쿠키',    combo: ['flour', 'butter', 'choco'],  sell: 16, tier: 2, color: '#6B4A32' },
      { id: 'berry',       name: '딸기쿠키',      combo: ['flour', 'sugar', 'berry'],   sell: 22, tier: 3, color: '#E08A9B' },
      { id: 'matcha',      name: '말차쿠키',      combo: ['flour', 'butter', 'matcha'], sell: 24, tier: 3, color: '#9BB08A' },
      { id: 'honey',       name: '허니쿠키',      combo: ['flour', 'sugar', 'honey'],   sell: 26, tier: 3, color: '#E3B23C' },
      { id: 'chocberry',   name: '초코딸기쿠키',  combo: ['flour', 'choco', 'berry'],   sell: 32, tier: 4, color: '#8A5A62' },
      { id: 'matchalatte', name: '말차라떼쿠키',  combo: ['flour', 'milk', 'matcha'],   sell: 34, tier: 4, color: '#B8C9A8' },
      { id: 'honeybutter', name: '허니버터쿠키',  combo: ['flour', 'butter', 'honey'],  sell: 38, tier: 4, color: '#E8C06B' },
      { id: 'signature',   name: '시그니처 쿠키', combo: ['choco', 'berry', 'matcha'],  sell: 50, tier: 5, color: '#C9A9D9' },
    ];

    const TRIPS = [
      { id: 'berry',  name: '새콤한 딸기밭',  emoji: '🍓', ing: 'berry',  min: 2, max: 4 },
      { id: 'matcha', name: '초록 찻잎 언덕', emoji: '🍵', ing: 'matcha', min: 2, max: 4 },
      { id: 'honey',  name: '꿀벌의 숲',      emoji: '🍯', ing: 'honey',  min: 2, max: 3 },
    ];

    const SEASON_DAYS = 30;
    const DAY_LENGTH = 70;      // seconds of open time
    const PATIENCE = 13;        // seconds per customer
    const MAX_REP = 100;

    // ============================================================
    // Game state
    // ============================================================
    let gameState = 'start';    // start, morning, day, evening, over
    let day, money, rep, stock, baked, known, trendId, tripPlan, tripResult, bailoutUsed;
    let served, angryCount, dayRevenue, dayRepDelta, totalServed, totalDiscoveries;

    function makeBubbleTexture() {

    class Customer {
      constructor(orderId) {
        this.order = orderId;
        this.state = 'enter'; // enter, queue, served, sit, leave
        this.patience = PATIENCE;
        this.slot = -1;
        this.seat = null;
        this.sitTimer = 0;
        this.walkT = 0;
        this.speed = 2.1 + Math.random() * 0.5;

        const g = makePerson(
          PALETTE[Math.floor(Math.random() * PALETTE.length)],
          SKIN[Math.floor(Math.random() * SKIN.length)],
          HAIR[Math.floor(Math.random() * HAIR.length)]
        );
        this.group = g;

        // order bubble sprite
        this.bubble = makeBubbleTexture();
        const sm = new THREE.SpriteMaterial({ map: this.bubble.tex, transparent: true, depthTest: false });
        this.sprite = new THREE.Sprite(sm);
        this.sprite.scale.set(1.05, 1.05, 1);
        this.sprite.position.y = 2.05;
        this.sprite.visible = false;
        g.add(this.sprite);

        g.position.copy(DOOR);
        scene.add(g);
      }

      drawBubble() {
        const { canvas: cv, ctx: c, tex } = this.bubble;
        const r = RECIPES.find(x => x.id === this.order);
        c.clearRect(0, 0, 128, 128);
        // bubble
        c.fillStyle = 'rgba(255,253,248,0.97)';
        c.strokeStyle = '#E9DFCE';
        c.lineWidth = 3;
        const rr = 22;
        c.beginPath();
        c.roundRect(10, 8, 108, 86, rr);
        c.fill(); c.stroke();
        c.beginPath();
        c.moveTo(54, 92); c.lineTo(64, 112); c.lineTo(76, 92);
        c.closePath();
        c.fillStyle = 'rgba(255,253,248,0.97)';
        c.fill();
        // cookie
        c.fillStyle = r.color;
        c.beginPath();
        c.arc(64, 46, 24, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = 'rgba(59,47,38,0.45)';
        for (const [dx, dy] of [[-8, -6], [7, -2], [-2, 9], [10, 8]]) {
          c.beginPath(); c.arc(64 + dx, 46 + dy, 3.2, 0, Math.PI * 2); c.fill();
        }
        // patience ring
        const frac = Math.max(0, this.patience / PATIENCE);
        c.strokeStyle = frac > 0.4 ? '#8FA98B' : '#D9704C';
        c.lineWidth = 6;
        c.beginPath();
        c.arc(64, 46, 32, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
        c.stroke();
        tex.needsUpdate = true;
      }

      moveToward(target, dt) {
        const p = this.group.position;
        const dx = target.x - p.x, dz = target.z - p.z;
        const d = Math.hypot(dx, dz);
        if (d < 0.08) return true;
        const step = this.speed * dt;
        p.x += (dx / d) * Math.min(step, d);
        p.z += (dz / d) * Math.min(step, d);
        this.group.rotation.y = Math.atan2(dx, dz);
        this.walkT += dt * 10;
        this.group.position.y = Math.abs(Math.sin(this.walkT)) * 0.06;
        return false;
      }

      update(dt) {
        if (this.state === 'enter') {
          const target = QUEUE_SLOTS[this.slot];
          if (this.moveToward(target, dt)) {
            this.state = 'queue';
            this.group.rotation.y = Math.PI; // face counter
            this.sprite.visible = true;
            this.drawBubble();
          }
        } else if (this.state === 'queue') {
          // drift toward (possibly advanced) slot
          this.moveToward(QUEUE_SLOTS[this.slot], dt);
          this.patience -= dt;
          if (Math.floor(this.patience * 5) !== this._lastDraw) {
            this._lastDraw = Math.floor(this.patience * 5);
            this.drawBubble();
          }
          if (this.patience <= 0) {
            this.state = 'leave';
            this.angry = true;
            this.sprite.visible = false;
            onCustomerAngry(this);
          }
        } else if (this.state === 'served') {
          // brief happy hop, then sit or leave
          this.sitTimer -= dt;
          this.group.position.y = Math.abs(Math.sin(this.sitTimer * 14)) * 0.12;
          if (this.sitTimer <= 0) {
            const seat = SEATS.find(s => !s.taken);
            if (seat && Math.random() < 0.7) {
              seat.taken = true;
              this.seat = seat;
              this.state = 'sit';
              this.sitTimer = 2.5 + Math.random() * 2.5;
            } else {
              this.state = 'leave';
            }
          }
        } else if (this.state === 'sit') {
          if (!this.seated) {
            if (this.moveToward(new THREE.Vector3(this.seat.x, 0, this.seat.z), dt)) {
              this.seated = true;
              this.group.position.y = 0.28;
            }
          } else {
            this.sitTimer -= dt;
            if (this.sitTimer <= 0) {
              this.seat.taken = false;
              this.state = 'leave';
              this.group.position.y = 0;
            }
          }
        } else if (this.state === 'leave') {
          if (this.moveToward(DOOR, dt)) {
            scene.remove(this.group);
            this.gone = true;
          }
        }
      }
    }

    function flyCookie(recipe, from, to, done) {
      const ck = cyl(0.2, 0.2, 0.09, recipe.color, from.x, from.y, from.z, 18);

      flyers.push({ mesh: ck, from: from.clone(), to: to.clone(), t: 0, done });
    }
    function updateFlyers(dt) {
      for (let i = flyers.length - 1; i >= 0; i--) {
        const f = flyers[i];
        f.t += dt * 2.6;
        const t = Math.min(1, f.t);
        f.mesh.position.lerpVectors(f.from, f.to, t);
        f.mesh.position.y += Math.sin(t * Math.PI) * 1.1;
        f.mesh.rotation.x += dt * 9;
        if (t >= 1) {
          scene.remove(f.mesh);
          flyers.splice(i, 1);
          f.done && f.done();
        }
      }
    }

    function buildHouse(x, z, wallColor, roofColor, w = 4.2, d = 3.4, h = 2.6) {
      const g = new THREE.Group();
      const body = box(w, h, d, wallColor, 0, h / 2, 0);
      const roof = new THREE.Mesh(new THREE.ConeGeometry(Math.max(w, d) * 0.78, 1.7, 4), mat(roofColor));
      roof.position.y = h + 0.85;
      roof.rotation.y = Math.PI / 4;
      roof.castShadow = true;
      const door = box(0.95, 1.5, 0.1, '#8A6136', 0, 0.75, d / 2 + 0.02);
      const knob = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), mat('#E8C06B'));
      knob.position.set(0.3, 0.75, d / 2 + 0.09);
      g.add(body, roof, door, knob);
      for (const wx of [-w * 0.28, w * 0.28]) {
        const win = box(0.8, 0.7, 0.08, '#FFF4D9', wx, 1.6, d / 2 + 0.02, { emissive: '#FFEDBE', emissiveIntensity: 0.5 });
        win.castShadow = false;
        const bar = box(0.86, 0.07, 0.1, '#B8A488', wx, 1.6, d / 2 + 0.04);
        g.add(win, bar);
      }
      g.position.set(x, 0, z);
      townScene.add(g);
      return g;
    }

    {

      // striped awning
      for (let i = 0; i < 5; i++) {

        strip.rotation.x = -0.28;
        strip.castShadow = false;
        shopB.add(strip);
      }
      const shopLabel = labelSprite('🍪 우리 쿠키샵');
      shopLabel.position.set(-6.2, 4.9, -5.2);
      townScene.add(shopLabel);

      // market stall

      const counter = box(3.6, 1.0, 1.6, '#B98F63', 0, 0.5, 0);

      for (const [px, pz] of [[-1.7, -0.7], [1.7, -0.7], [-1.7, 0.7], [1.7, 0.7]]) {

      // produce crates
      for (const [cx, col] of [[-1.0, '#E08A9B'], [0, '#E3B23C'], [1.0, '#9BB08A']]) {
        const crate = box(0.7, 0.4, 0.7, '#C9A87C', cx, 1.2, 0.1);
        mk.add(crate);
        for (let j = 0; j < 3; j++) {
          const fruit = new THREE.Mesh(new THREE.SphereGeometry(0.13, 10, 8), mat(col));
          fruit.position.set(cx - 0.18 + j * 0.18, 1.46, 0.1 + (j % 2 ? 0.12 : -0.08));
          mk.add(fruit);
        }
      }
      mk.position.set(6.6, 0, -4.4);
      townScene.add(mk);
      const mkLabel = labelSprite('🧺 마켓');
      mkLabel.position.set(6.6, 3.6, -4.4);
      townScene.add(mkLabel);

      // forest sign
      const post = cyl(0.08, 0.1, 1.5, '#8A6136', 0.4, 0.75, -8.9, 10);
      const sign = box(1.7, 0.8, 0.12, '#B98F63', 0.4, 1.6, -8.9);
      townScene.add(post, sign);
      const fLabel = labelSprite('🌲 탐험 숲');
      fLabel.position.set(0.4, 2.8, -8.9);
      townScene.add(fLabel);
    }

    // ---- POIs & doorstep rings ----
    const POIS = [
      { id: 'shop',   pos: new THREE.Vector3(-6.2, 0, -3.0) },
      { id: 'market', pos: new THREE.Vector3(6.6, 0, -2.9) },
      { id: 'forest', pos: new THREE.Vector3(0.4, 0, -7.9) },
    ];
    for (const poi of POIS) {
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(0.55, 0.85, 28),
        new THREE.MeshBasicMaterial({ color: '#E8A13C', transparent: true, opacity: 0.55, side: THREE.DoubleSide })
      );
      ring.rotation.x = -Math.PI / 2;
      ring.position.copy(poi.pos).setY(0.04);
      townScene.add(ring);
      poi.ring = ring;
    }

    // ---- player character ----
    const playerChar = new THREE.Group();
    {
      const person = makePerson('#E8A13C', '#F2D5B8', '#4E3A2A');
      const hatBrim = cyl(0.24, 0.24, 0.05, '#FFF9EE', 0, 1.44, 0, 14);
      const hatTop = cyl(0.19, 0.22, 0.24, '#FFF9EE', 0, 1.58, 0, 14);
      const apron = box(0.36, 0.42, 0.07, '#FFF9EE', 0, 0.56, 0.29);
      playerChar.add(person, hatBrim, hatTop, apron);
      playerChar.position.set(0.5, 0, 3.2);
      townScene.add(playerChar);
    }

    // ---- town input ----
    const townKeys = { up: false, down: false, left: false, right: false };
    let moveTarget = null;
    let walkPhase = 0;
    let poiOpen = null;
    let poiCooldown = 0;

    window.addEventListener('keydown', (e) => {
      if (gameState !== 'morning' || poiOpen) return;
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault();
      if (e.code === 'ArrowUp' || e.code === 'KeyW') townKeys.up = true;
      if (e.code === 'ArrowDown' || e.code === 'KeyS') townKeys.down = true;
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') townKeys.left = true;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') townKeys.right = true;
    });
    window.addEventListener('keyup', (e) => {
      if (e.code === 'ArrowUp' || e.code === 'KeyW') townKeys.up = false;
      if (e.code === 'ArrowDown' || e.code === 'KeyS') townKeys.down = false;
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') townKeys.left = false;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') townKeys.right = false;
    });

    const raycaster = new THREE.Raycaster();
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    canvas.addEventListener('pointerdown', (e) => {
      if (gameState !== 'morning' || poiOpen || phase3D !== 'town') return;
      const r = canvas.getBoundingClientRect();
      const nd = new THREE.Vector2(
        ((e.clientX - r.left) / r.width) * 2 - 1,
        -(((e.clientY - r.top) / r.height) * 2 - 1)
      );
      raycaster.setFromCamera(nd, townCam);
      const pt = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(groundPlane, pt)) moveTarget = pt;
    });

    function updateTown(dt) {
      poiCooldown -= dt;
      const p = playerChar.position;
      let dx = 0, dz = 0;
      if (!poiOpen) {
        if (townKeys.up) dz -= 1;
        if (townKeys.down) dz += 1;
        if (townKeys.left) dx -= 1;
        if (townKeys.right) dx += 1;
      }
      const SPEED = 3.4;
      let moving = false;
      if (dx || dz) {
        moveTarget = null;
        const len = Math.hypot(dx, dz);
        p.x += (dx / len) * SPEED * dt;
        p.z += (dz / len) * SPEED * dt;
        playerChar.rotation.y = Math.atan2(dx, dz);
        moving = true;
      } else if (moveTarget && !poiOpen) {
        const mx = moveTarget.x - p.x, mz = moveTarget.z - p.z;
        const d = Math.hypot(mx, mz);
        if (d > 0.12) {
          p.x += (mx / d) * Math.min(SPEED * dt, d);
          p.z += (mz / d) * Math.min(SPEED * dt, d);
          playerChar.rotation.y = Math.atan2(mx, mz);
          moving = true;
        } else {
          moveTarget = null;
        }
      }
      // bounds
      p.x = Math.max(-13, Math.min(13, p.x));
      p.z = Math.max(-11.5, Math.min(8.5, p.z));
      // walk bob
      if (moving) {
        walkPhase += dt * 11;
        playerChar.position.y = Math.abs(Math.sin(walkPhase)) * 0.07;
      } else {
        playerChar.position.y *= 0.8;
      }

      // dog follows behind
      const back = new THREE.Vector3(Math.sin(playerChar.rotation.y), 0, Math.cos(playerChar.rotation.y)).multiplyScalar(-1.15);
      const dogTarget = p.clone().add(back);
      dogTarget.y = 0;
      dog.position.lerp(dogTarget, Math.min(1, 4.5 * dt));
      const ddx = p.x - dog.position.x, ddz = p.z - dog.position.z;
      if (Math.hypot(ddx, ddz) > 0.2) dog.rotation.y = Math.atan2(ddx, ddz) - Math.PI / 2;
      dog.position.y = moving ? Math.abs(Math.sin(walkPhase * 1.1)) * 0.06 : 0;

      // doorstep rings pulse
      for (const poi of POIS) {
        const s = 1 + Math.sin(time * 3.2) * 0.08;
        poi.ring.scale.set(s, s, 1);
      }

      // proximity → open panel
      if (!poiOpen && poiCooldown <= 0) {
        for (const poi of POIS) {
          if (Math.hypot(p.x - poi.pos.x, p.z - poi.pos.z) < 1.35) {
            openPoi(poi.id);
            break;
          }
        }
      }

      // follow cam
      const camTarget = p.clone().add(TOWN_CAM_OFFSET);
      townCam.position.lerp(camTarget, Math.min(1, 5 * dt));
      townCam.lookAt(p.x, 1.0, p.z);
    }

    // ============================================================
    // DOM helpers
    // ============================================================
    const $ = (id) => document.getElementById(id);
    function floatText(worldPos, text, color = '#FFE1A8') {
      const v = worldPos.clone().project(camera);
      const rect = canvas.getBoundingClientRect();
      const wrap = $('stageWrap').getBoundingClientRect();
      const x = ((v.x + 1) / 2) * rect.width + (rect.left - wrap.left);
      const y = ((1 - v.y) / 2) * rect.height + (rect.top - wrap.top);
      const el = document.createElement('div');
      el.className = 'cs-float';
      el.style.left = (x - 20) + 'px';
      el.style.top = (y - 10) + 'px';
      el.style.color = color;
      el.textContent = text;
      $('floatLayer').appendChild(el);
      setTimeout(() => el.remove(), 1150);
    }

    // ============================================================
    // Morning phase
    // ============================================================
    let toastTimer = null;
    function showToast(html, ms = 5200) {
      const t = $('toast');
      t.innerHTML = html;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), ms);
    }

    function startMorning() {
      gameState = 'morning';
      phase3D = 'town';
      $('serveBar').style.display = 'none';
      $('eveningPanel').style.display = 'none';
      $('morningPanel').style.display = 'none';
      $('townHint').style.display = '';

      // expedition return
      let news = '';
      if (tripPlan) {
        const trip = TRIPS.find(t => t.id === tripPlan);
        const n = trip.min + Math.floor(Math.random() * (trip.max - trip.min + 1));
        stock[trip.ing] = (stock[trip.ing] || 0) + n;
        news = `🐕 황구가 ${trip.name}에서 ${INGREDIENTS[trip.ing].name} <b>${n}개</b>를 물어왔어요!`;
        tripPlan = null;
      }

      // daily trend
      trendId = RECIPES[Math.floor(Math.random() * RECIPES.length)].id;
      const trend = RECIPES.find(r => r.id === trendId);

      // anti-softlock: tiny cheer fund
      if (!bailoutUsed && money < 10 && bakedTotal() === 0 && !anyBakeable()) {
        money += 25;
        bailoutUsed = true;
        news += (news ? '<br>' : '') + '💌 이웃 할머니가 응원금 🪙25를 놓고 가셨어요.';
      }

      // reset town actors
      playerChar.position.set(0.5, 0, 3.2);
      playerChar.rotation.y = Math.PI;
      townScene.add(dog);
      dog.position.set(1.6, 0, 4.0);
      dog.rotation.y = Math.PI;
      moveTarget = null;
      poiOpen = null;
      poiCooldown = 1.2;
      townCam.position.copy(playerChar.position).add(TOWN_CAM_OFFSET);
      townCam.lookAt(playerChar.position.x, 1.0, playerChar.position.z);

      // town HUD
      $('dayHud').style.display = '';
      $('hudDay').textContent = `DAY ${String(day).padStart(2, '0')} · MORNING`;
      $('hudMoney').textContent = `🪙 ${money}`;
      $('hudStars').textContent = starStr();
      $('hudTime').style.width = '0%';

      showToast(`📈 <b>오늘의 트렌드</b> — ${trend.name} (판매가 +50%)${known.has(trendId) ? '' : ' · 아직 모르는 레시피!'}${news ? '<br>' + news : ''}`);
    }

    // ---- POI panels ----
    const POI_META = {
      shop:   { title: '우리 쿠키샵', eyebrow: 'MY SHOP',  close: '이따 다시 올게요' },
      market: { title: '마켓',        eyebrow: 'MARKET',   close: '마켓에서 나가기' },
      forest: { title: '탐험 숲 입구', eyebrow: 'FOREST',   close: '숲에서 나가기' },
    };

    function openPoi(id) {
      poiOpen = id;
      moveTarget = null;
      const meta = POI_META[id];
      $('mEyebrow').textContent = `DAY ${String(day).padStart(2, '0')} · ${meta.eyebrow}`;
      $('mTitle').textContent = meta.title;
      $('poiCloseBtn').textContent = meta.close;
      $('poiTabs').style.display = id === 'shop' ? '' : 'none';
      $('openBtn').style.display = id === 'shop' ? '' : 'none';
      const trend = RECIPES.find(r => r.id === trendId);
      $('mTrend').innerHTML = id === 'shop'
        ? `📈 오늘의 트렌드 — <b>${trend.name}</b> (판매가 +50%)`
        : (id === 'market' ? '재료를 사고 팔아요. 🍯 꿀은 탐험 숲에서만!' : '🐕 황구를 보내면 내일 아침 재료를 물어와요.');
      updateMorningHeader();
      if (id === 'shop') {
        currentTab = bakedTotal() > 0 || !anyBakeable() ? currentTab : 'bake';
        if (currentTab !== 'lab' && currentTab !== 'bake') currentTab = 'lab';
        window._tab(currentTab);
      } else if (id === 'market') {
        renderTab('shop');
      } else {
        renderTab('trip');
      }
      $('morningPanel').style.display = '';
      $('townHint').style.display = 'none';
      if (soundEnabled) sound.playChime();
    }

    window._closePoi = function () {
      $('morningPanel').style.display = 'none';
      $('townHint').style.display = '';
      if (poiOpen) {
        const poi = POIS.find(x => x.id === poiOpen);
        const p = playerChar.position;
        const away = p.clone().sub(poi.pos).setY(0);
        if (away.lengthSq() < 0.01) away.set(0, 0, 1);
        away.normalize().multiplyScalar(1.7);
        p.add(away);
      }
      poiOpen = null;
      poiCooldown = 0.9;
      $('hudMoney').textContent = `🪙 ${money}`;
      $('hudStars').textContent = starStr();
      if (soundEnabled) sound.playClick();
    };

    function updateMorningHeader() {
      $('mMoney').textContent = `🪙 ${money}`;
      $('mStars').textContent = `${starStr()} ${rep}/${MAX_REP}`;
      const n = bakedTotal();
      $('bakeN').style.display = n > 0 ? '' : 'none';
      $('bakeN').textContent = n;
      $('openBtn').textContent = n > 0 ? '영업 시작' : '영업 시작 (구운 쿠키가 없어요!)';
    }

    function bakedTotal() { return Object.values(baked).reduce((a, b) => a + b, 0); }
    function anyBakeable() {
      return RECIPES.some(r => known.has(r.id) && r.combo.every(i => (stock[i] || 0) > 0));
    }

    window._tab = function (tab) {
      currentTab = tab;
      document.querySelectorAll('.cs-tab').forEach(el => el.classList.toggle('on', el.dataset.tab === tab));
      renderTab(tab);
    };

    function renderTab(tab) {
      const el = $('tabBody');
      if (tab === 'shop') {
        el.innerHTML = `<div class="cs-list">` + Object.entries(INGREDIENTS).filter(([, v]) => v.shop).map(([id, v]) => `
          <div class="cs-item">
            <div class="ico">${v.emoji}</div>
            <div class="body">
              <div class="name">${v.name}</div>
              <div class="meta">개당 🪙${v.price} · 보유 ${stock[id] || 0}</div>
            </div>
            <div class="ctrl">
              <button class="cs-btn tiny" onclick="window._buy('${id}', -1)">−</button>
              <button class="cs-btn tiny" onclick="window._buy('${id}', 1)">+</button>
            </div>
          </div>`).join('') +
          `<div class="cs-sub" style="margin-top:2px;">🍯 꿀은 상점에서 팔지 않아요 — 황구를 <b>탐험</b> 보내보세요.</div></div>`;
      } else if (tab === 'lab') {
        const undiscovered = RECIPES.filter(r => !known.has(r.id)).length;
        el.innerHTML = `
          <div class="cs-sub" style="text-align:center;">재료 3개를 골라 새 레시피를 발견하세요 · 남은 조합 <b>${undiscovered}</b>가지</div>
          <div class="lab-slots">${labSlots.map((s, i) =>
            `<div class="lab-slot ${s ? 'filled' : ''}" onclick="window._slotClear(${i})">${s ? INGREDIENTS[s].emoji : '＋'}</div>`).join('')}
          </div>
          <div class="lab-pool">${Object.entries(INGREDIENTS).map(([id, v]) =>
            `<div class="lab-ing" onclick="window._slotAdd('${id}')">${v.emoji}<span>${v.name}</span></div>`).join('')}
          </div>
          <div class="lab-msg" id="labMsg"></div>
          <button class="cs-btn ghost" style="width:100%;" onclick="window._combine()">이 조합으로 연구하기</button>
          <div style="height:14px;"></div>
          <div class="recipe-grid">${RECIPES.map(r => {
            const isKnown = known.has(r.id);
            return `<div class="recipe-card ${isKnown ? '' : 'locked'} ${r.id === trendId ? 'trend' : ''}">
              <div class="rn">${isKnown ? r.name : '？？？'} ${r.id === trendId ? '📈' : ''}</div>
              <div class="rc">${isKnown ? r.combo.map(i => INGREDIENTS[i].emoji).join(' ') + ` · 🪙${r.sell}` : '미발견 레시피'}</div>
            </div>`;
          }).join('')}</div>`;
      } else if (tab === 'bake') {
        el.innerHTML = `<div class="cs-list">` + RECIPES.filter(r => known.has(r.id)).map(r => {
          const max = Math.min(...r.combo.map(i => stock[i] || 0));
          return `<div class="cs-item">
            <div class="ico" style="background:${r.color}22;">🍪</div>
            <div class="body">
              <div class="name">${r.name} ${r.id === trendId ? '📈' : ''}</div>
              <div class="meta">${r.combo.map(i => INGREDIENTS[i].emoji + (stock[i] || 0)).join(' · ')} → 판매 🪙${r.id === trendId ? Math.round(r.sell * 1.5) : r.sell}</div>
            </div>
            <div class="ctrl">
              <button class="cs-btn tiny" onclick="window._bake('${r.id}', -1)">−</button>
              <div class="qty">${baked[r.id] || 0}</div>
              <button class="cs-btn tiny" ${max <= 0 ? 'disabled' : ''} onclick="window._bake('${r.id}', 1)">＋</button>
            </div>
          </div>`;
        }).join('') + `<div class="cs-sub" style="margin-top:2px;">＋를 누르면 재료를 소모해 바로 굽습니다. −는 재료로 되돌려요.</div></div>`;
      } else if (tab === 'trip') {
        el.innerHTML = `
          <div class="cs-sub" style="margin-bottom:10px;">🐕 황구를 하루 탐험 보내면 <b>내일 아침</b> 희귀 재료를 물어옵니다. (하루 한 곳)</div>
          <div class="cs-list">${TRIPS.map(t => `
            <div class="cs-item" style="${tripPlan === t.id ? 'border-color:var(--cs-butter); background:#FBF0DC;' : ''}">
              <div class="ico">${t.emoji}</div>
              <div class="body">
                <div class="name">${t.name}</div>
                <div class="meta">${INGREDIENTS[t.ing].name} ${t.min}~${t.max}개 획득</div>
              </div>
              <div class="ctrl">
                <button class="cs-btn ghost" onclick="window._trip('${t.id}')">${tripPlan === t.id ? '취소' : '보내기'}</button>
              </div>
            </div>`).join('')}
          </div>`;
      }
    }

    window._buy = function (id, dir) {
      const v = INGREDIENTS[id];
      if (dir > 0) {
        if (money < v.price) { if (soundEnabled) sound.playFail(); return; }
        money -= v.price;
        stock[id] = (stock[id] || 0) + 1;
        if (soundEnabled) sound.playCoin();
      } else {
        if ((stock[id] || 0) <= 0) return;
        stock[id]--;
        money += v.price; // full refund, friendly
        if (soundEnabled) sound.playClick();
      }
      updateMorningHeader();
      renderTab('shop');
    };

    window._slotAdd = function (id) {
      const i = labSlots.indexOf(null);
      if (i === -1) return;
      labSlots[i] = id;
      if (soundEnabled) sound.playClick();
      renderTab('lab');
    };
    window._slotClear = function (i) {
      if (!labSlots[i]) return;
      labSlots[i] = null;
      if (soundEnabled) sound.playClick();
      renderTab('lab');
    };
    window._combine = function () {
      if (labSlots.some(s => !s)) {
        renderTab('lab');
        $('labMsg').textContent = '재료 3개를 모두 채워주세요';
        $('labMsg').style.color = 'var(--cs-ink-soft)';
        return;
      }
      const sorted = [...labSlots].sort().join(',');
      const hit = RECIPES.find(r => [...r.combo].sort().join(',') === sorted);
      if (hit && !known.has(hit.id)) {
        known.add(hit.id);
        totalDiscoveries++;
        labSlots = [null, null, null];
        if (soundEnabled) sound.playDiscover();
        renderTab('lab');
        $('labMsg').innerHTML = `✨ <b>${hit.name}</b> 레시피 발견! (판매가 🪙${hit.sell})`;
        $('labMsg').style.color = 'var(--cs-butter-deep)';
      } else if (hit) {
        renderTab('lab');
        $('labMsg').textContent = '이미 알고 있는 레시피예요';
        $('labMsg').style.color = 'var(--cs-ink-soft)';
        if (soundEnabled) sound.playClick();
      } else {
        if (soundEnabled) sound.playFail();
        renderTab('lab');
        $('labMsg').textContent = '음… 이 조합은 아닌 것 같아요';
        $('labMsg').style.color = 'var(--cs-terra)';
      }
      updateMorningHeader();
    };

    window._bake = function (id, dir) {
      const r = RECIPES.find(x => x.id === id);
      if (dir > 0) {
        if (!r.combo.every(i => (stock[i] || 0) > 0)) return;
        r.combo.forEach(i => stock[i]--);
        baked[id] = (baked[id] || 0) + 1;
        if (soundEnabled) sound.playBake();
      } else {
        if ((baked[id] || 0) <= 0) return;
        baked[id]--;
        r.combo.forEach(i => stock[i] = (stock[i] || 0) + 1);
        if (soundEnabled) sound.playClick();
      }
      updateMorningHeader();
      renderTab('bake');
    };

    window._trip = function (id) {
      tripPlan = tripPlan === id ? null : id;
      if (soundEnabled) sound.playClick();
      renderTab('trip');
    };

    // ============================================================
    // Day phase
    // ============================================================
    window._openShop = function () {
      $('morningPanel').style.display = 'none';
      $('townHint').style.display = 'none';
      poiOpen = null;
      phase3D = 'shop';
      scene.add(dog);
      dog.position.set(-4.6, 0, 0.6);
      dog.rotation.set(0, 0.7, 0);
      startDay();
    };

    function startDay() {
      gameState = 'day';
      served = 0; angryCount = 0; dayRevenue = 0; dayRepDelta = 0;
      dayTimer = DAY_LENGTH;
      customers = [];
      SEATS.forEach(s => s.taken = false);

      // schedule customers
      const count = Math.min(15, 5 + stars() * 2 + Math.floor(day / 4));
      spawnQueue = [];
      for (let i = 0; i < count; i++) {
        spawnQueue.push(2 + (DAY_LENGTH - 14) * (i / count) + Math.random() * 3);
      }
      spawnQueue.sort((a, b) => a - b);

      $('dayHud').style.display = '';
      $('serveBar').style.display = '';
      renderServeBar();
      updateHud();
      if (soundEnabled) sound.playChime();
    }

    function pickOrder() {
      // orders lean toward baked stock (so serving is possible), trend boosted
      const pool = [];
      for (const r of RECIPES) {
        if (!known.has(r.id)) continue;
        let w = (baked[r.id] || 0) > 0 ? 6 : 1;
        if (r.id === trendId) w *= 2;
        w += r.tier * 0.3;
        pool.push({ id: r.id, w });
      }
      if (!pool.length) return RECIPES[0].id;
      let total = pool.reduce((a, p) => a + p.w, 0);
      let roll = Math.random() * total;
      for (const p of pool) { roll -= p.w; if (roll <= 0) return p.id; }
      return pool[pool.length - 1].id;
    }

    function freeSlot() {
      const usedSlots = customers.filter(c => c.state === 'enter' || c.state === 'queue').map(c => c.slot);
      for (let i = 0; i < QUEUE_SLOTS.length; i++) if (!usedSlots.includes(i)) return i;
      return -1;
    }

    function compactQueue() {
      const queued = customers
        .filter(c => (c.state === 'queue' || c.state === 'enter') && c.slot >= 0)
        .sort((a, b) => a.slot - b.slot);
      queued.forEach((c, i) => { c.slot = i; });
    }

    function updateDay(dt) {
      dayTimer -= dt;

      // spawns
      const elapsedDay = DAY_LENGTH - dayTimer;
      while (spawnQueue.length && spawnQueue[0] <= elapsedDay) {
        spawnQueue.shift();
        const slot = freeSlot();
        if (slot !== -1) {
          const c = new Customer(pickOrder());
          c.slot = slot;
          customers.push(c);
          if (soundEnabled) sound.playChime();
        } else {
          // shop crowded — walks on by, slight rep miss
          dayRepDelta -= 1;
          rep = Math.max(0, rep - 1);
        }
      }

      for (const c of customers) c.update(dt);
      const before = customers.length;
      customers = customers.filter(c => !c.gone);
      if (customers.length !== before) compactQueue();

      updateFlyers(dt);
      updateHud();

      // end of day: time over AND everyone gone AND nothing scheduled
      if (dayTimer <= 0 && customers.length === 0 && spawnQueue.length === 0) {
        startEvening();
      }
    }

    function updateHud() {
      $('hudDay').textContent = `DAY ${String(day).padStart(2, '0')} · OPEN`;
      $('hudMoney').textContent = `🪙 ${money}`;
      $('hudStars').textContent = starStr();
      $('hudTime').style.width = Math.max(0, (dayTimer / DAY_LENGTH) * 100) + '%';
    }

    function renderServeBar() {
      const bar = $('serveBar');
      const showList = RECIPES.filter(r => known.has(r.id));
      bar.innerHTML = showList.map(r => {
        const n = baked[r.id] || 0;
        return `<div class="serve-card ${n <= 0 ? 'empty' : ''}" id="serve-${r.id}" onclick="window._serve('${r.id}')">
          <div class="dot" style="background:${r.color};">
            <i style="left:6px;top:8px;"></i><i style="left:17px;top:14px;"></i><i style="left:10px;top:19px;"></i>
          </div>
          <div class="nm">${r.name}</div>
          <div class="ct">×${n}</div>
        </div>`;
      }).join('');
    }

    window._serve = function (id) {
      if (gameState !== 'day') return;
      const card = $('serve-' + id);
      if ((baked[id] || 0) <= 0) {
        card?.classList.add('shake');
        setTimeout(() => card?.classList.remove('shake'), 320);
        if (soundEnabled) sound.playFail();
        return;
      }
      // first queued customer wanting this cookie
      const c = customers
        .filter(x => x.state === 'queue' && x.order === id)
        .sort((a, b) => a.slot - b.slot)[0];
      if (!c) {
        card?.classList.add('shake');
        setTimeout(() => card?.classList.remove('shake'), 320);
        if (soundEnabled) sound.playFail();
        return;
      }
      baked[id]--;
      const r = RECIPES.find(x => x.id === id);
      const price = id === trendId ? Math.round(r.sell * 1.5) : r.sell;

      c.state = 'served';
      c.sitTimer = 0.55;
      c.sprite.visible = false;
      compactQueue();

      const from = new THREE.Vector3(-1.0, 1.5, -1.4);
      const to = c.group.position.clone().setY(1.1);
      flyCookie(r, from, to, () => {
        money += price;
        dayRevenue += price;
        const gain = r.tier;
        rep = Math.min(MAX_REP, rep + gain);
        dayRepDelta += gain;
        served++; totalServed++;
        floatText(c.group.position.clone().setY(2.2), `+${price} 🪙`);
        if (soundEnabled) sound.playCoin();
        renderServeBar();
        updateHud();
      });
      if (soundEnabled) sound.playServe();
      renderServeBar();
    };

    function onCustomerAngry(c) {
      angryCount++;
      rep = Math.max(0, rep - 3);
      dayRepDelta -= 3;
      floatText(c.group.position.clone().setY(2.2), '💢', '#FF8A70');
      if (soundEnabled) sound.playAngry();
      compactQueue();
    }

    // ============================================================
    // Evening phase
    // ============================================================
    function startEvening() {
      gameState = 'evening';
      $('dayHud').style.display = 'none';
      $('serveBar').style.display = 'none';

      const isWin = rep >= MAX_REP;
      const isLastDay = day >= SEASON_DAYS;

      $('eEyebrow').textContent = `DAY ${String(day).padStart(2, '0')} · CLOSED`;
      const trend = RECIPES.find(r => r.id === trendId);
      $('eBody').innerHTML = `
        <div class="ev-stat"><span>서빙한 손님</span><b>${served}명</b></div>
        <div class="ev-stat"><span>화나서 떠난 손님</span><b style="color:${angryCount ? 'var(--cs-terra)' : 'inherit'}">${angryCount}명</b></div>
        <div class="ev-stat"><span>오늘 매출</span><b>🪙 ${dayRevenue}</b></div>
        <div class="ev-stat"><span>평판 변화</span><b style="color:${dayRepDelta >= 0 ? 'var(--cs-sage)' : 'var(--cs-terra)'}">${dayRepDelta >= 0 ? '+' : ''}${dayRepDelta}</b></div>
        <div class="ev-stat"><span>오늘의 트렌드였던 메뉴</span><b>${trend.name}</b></div>
        <div style="margin-top:12px;">
          <div class="cs-row">
            <span class="cs-eyebrow">REPUTATION</span>
            <span class="star-row" style="color:var(--cs-butter-deep);">${starStr()}</span>
          </div>
          <div class="star-track"><div style="width:${rep}%"></div></div>
          <div class="cs-sub" style="margin-top:5px; text-align:right;">${rep} / ${MAX_REP}</div>
        </div>`;
      $('nextDayBtn').textContent = isWin ? '🎖️ 명예의 전당 입성!' : (isLastDay ? '시즌 결산 보기' : '다음 날로');
      $('eveningPanel').style.display = '';

      window._nextDay = function () {
        $('eveningPanel').style.display = 'none';
        if (isWin) endGame(true);
        else if (isLastDay) endGame(false);
        else { day++; startMorning(); }
      };
    }

    // ============================================================
    // End / flow
    // ============================================================
    function computeScore() {
      return money + rep * 15 + totalDiscoveries * 100 + totalServed * 5;
    }

    function endGame(won) {
      gameState = 'over';
      const score = computeScore();
      scoreManager.addScore(GAME_ID, score);
      recordSystem.showSubmitFlow(GAME_ID, score);

      $('resultTitle').textContent = won ? '🎖️ 명예의 전당!' : '시즌 종료';
      $('finalScore').textContent = score.toLocaleString();
      const best = scoreManager.getBest(GAME_ID);
      $('resultStats').innerHTML = `
        <div class="result-stat"><div class="result-stat-value">${starStr()}</div><div class="result-stat-label">최종 별점</div></div>
        <div class="result-stat"><div class="result-stat-value">${totalServed}</div><div class="result-stat-label">서빙한 손님</div></div>
        <div class="result-stat"><div class="result-stat-value">${totalDiscoveries + 1}/${RECIPES.length}</div><div class="result-stat-label">레시피 발견</div></div>
        <div class="result-stat"><div class="result-stat-value">${best.toLocaleString()}</div><div class="result-stat-label">최고 기록</div></div>`;
      let msg = '';
      if (score >= best && score > 0) msg += '새로운 최고 기록! ';
      if (won) msg += `단 ${day}일 만에 별 다섯 개 — 골목의 전설이 됐어요!`;
      else if (stars() >= 4) msg += '별 네 개! 명예의 전당이 코앞이었어요.';
      else if (stars() >= 2) msg += '단골이 생기기 시작했어요. 다음 시즌엔 더 높이!';
      else msg += '장사가 쉽지 않죠? 트렌드 메뉴를 노려보세요.';
      $('resultMessage').textContent = msg;
      $('gameOverScreen').style.display = '';
      if (won && soundEnabled) sound.playVictory();
    }

    function initGame() {
      day = 1;
      money = 60;
      rep = 10;
      stock = { flour: 6, butter: 4, sugar: 4 };
      baked = {};
      known = new Set(['butter']);
      trendId = null;
      tripPlan = null;
      bailoutUsed = false;
      totalServed = 0;
      totalDiscoveries = 0;
      labSlots = [null, null, null];
      currentTab = 'lab';
      customers = [];
      startMorning();
    }

    // ============================================================
    // Loop
    // ============================================================
    function update(dt) {
      time += dt;
      const tail = dog.getObjectByName('tail');
      if (tail) tail.rotation.y = Math.sin(time * 7) * 0.5;

      if (phase3D === 'town') {
        if (gameState === 'morning') updateTown(dt);
        return;
      }
      // shop scene
      camera.position.x = CAM_BASE.x + Math.sin(time * 0.28) * 0.14;
      camera.position.y = CAM_BASE.y + Math.sin(time * 0.2) * 0.08;
      camera.lookAt(-0.4, 1.0, -0.4);
      dog.position.y = Math.abs(Math.sin(time * 2.2)) * 0.02;

      if (gameState === 'day') updateDay(dt);
      else updateFlyers(dt);
    }

    function render() {
      if (phase3D === 'town') renderer.render(townScene, townCam);
      else renderer.render(scene, camera);
    }

    // ============================================================
    // Boot
    // ============================================================
    window.startGame = function () {
      sound.init();
      sound.resume();
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('gameOverScreen').style.display = 'none';
      initGame();
      if (!gameLoop) {
        gameLoop = new GameLoop({ update, render });
        gameLoop.start();
      }
    };

    window.restartGame = function () {
      document.getElementById('gameOverScreen').style.display = 'none';
      // clear leftover customers
      for (const c of customers || []) scene.remove(c.group);
      initGame();
    };

    window.toggleSound = function () {
      soundEnabled = !soundEnabled;
      document.querySelector('.sound-btn').textContent = soundEnabled ? '사운드 ON' : '사운드 OFF';
      if (soundEnabled) { sound.init(); sound.resume(); }
    };

    // idle preview render behind the start overlay
    const previewLoop = new GameLoop({
      update(dt) {
        time += dt;
        camera.position.x = CAM_BASE.x + Math.sin(time * 0.28) * 0.14;
        camera.lookAt(-0.4, 1.0, -0.4);
        const tail = dog.getObjectByName('tail');
        if (tail) tail.rotation.y = Math.sin(time * 7) * 0.5;
      },
      render() { renderer.render(scene, camera); }
    });
    previewLoop.start();
    // stop preview when real loop takes over
    const _origStart = window.startGame;
    window.startGame = function () { previewLoop.stop(); _origStart(); };
  </script>
</body>
</html>
